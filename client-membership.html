<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Membership — Private Mentorship</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
<link rel="stylesheet" href="js/sidebar.css?v=20260508c" />
<link rel="icon" href="assets/logos/pm-logo.png" />
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#F1F5F9;color:#1F2937;font-family:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
  :root{
    --bg:#F1F5F9;--card:#FFFFFF;--border:#E2E8F0;--border-soft:#EEF2F7;
    --ink:#1F2937;--ink-2:#0F172A;--ink-mute:#64748B;--ink-tert:#94A3B8;
    --primary:#5750F1;--primary-soft:#EEF1FB;
    --green-soft:#DCFCE7;--orange-soft:#FFF1E2;--red:#EF4444;--red-soft:#FEE2E2;
    --gold:#D4A574;--gold-glow:rgba(212,165,116,0.4);
  }

  /* Top bar */
  .nx-topbar{background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:14px 26px;gap:16px;position:sticky;top:0;z-index:20;}
  .nx-search{flex:1;max-width:520px;position:relative;}
  .nx-search input{width:100%;background:#F1F5F9;border:1px solid transparent;border-radius:10px;padding:10px 14px 10px 38px;font:500 13.5px Inter,sans-serif;color:var(--ink);}
  .nx-search input::placeholder{color:var(--ink-tert);font-weight:400;}
  .nx-search input:focus{outline:none;border-color:var(--primary);background:#fff;}
  .nx-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-tert);}
  .nx-userpod{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 5px;border:1px solid var(--border);border-radius:9999px;background:#fff;}
  .nx-userpod__avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#5750F1 0%,#0ABEF9 100%);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px -1px rgba(87,80,241,0.35);}
  .nx-userpod__name{font-size:13.5px;font-weight:700;color:var(--ink);letter-spacing:-.005em;}

  /* Shell */
  .nx-shell{padding:32px 28px 80px;max-width:1180px;margin:0 auto;}
  .nx-head{margin-bottom:28px;}
  .nx-h1{font-size:32px;font-weight:800;letter-spacing:-.025em;margin:0 0 8px;color:var(--ink-2);line-height:1.05;}
  .nx-sub{font-size:14.5px;color:var(--ink-mute);margin:0;font-weight:500;letter-spacing:-.005em;}

  /* Premium dark hero — current contract */
  .nx-hero{
    position:relative;overflow:hidden;
    background:linear-gradient(135deg,#0F172A 0%,#1E293B 50%,#334155 100%);
    color:#fff;border-radius:22px;padding:38px 38px 32px;margin-bottom:26px;
    box-shadow:0 28px 60px -20px rgba(15,23,42,0.6);
  }
  .nx-hero::before{
    content:'';position:absolute;top:-100px;right:-80px;width:340px;height:340px;
    background:radial-gradient(closest-side,rgba(212,165,116,0.18),transparent 70%);
    pointer-events:none;
  }
  .nx-hero__corner{
    position:absolute;top:18px;right:18px;
    background:linear-gradient(135deg,#D4A574,#B08654);
    color:#1A0F00;
    padding:6px 12px;border-radius:9999px;
    font-size:10.5px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;
    box-shadow:0 6px 14px -4px var(--gold-glow);
    display:inline-flex;align-items:center;gap:6px;
  }
  .nx-hero__corner::before{
    content:'';width:6px;height:6px;border-radius:50%;background:#1A0F00;
  }
  .nx-hero__eyebrow{font-size:11px;font-weight:800;letter-spacing:.20em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin:0 0 14px;}
  .nx-hero__tier{font-size:34px;font-weight:800;letter-spacing:-.028em;margin:0;line-height:1.05;}
  .nx-hero__sub{font-size:14.5px;color:rgba(255,255,255,0.65);margin:8px 0 0;font-weight:500;letter-spacing:-.005em;}

  .nx-hero__row{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:24px;margin-top:30px;align-items:end;}
  .nx-hero__metric-label{font-size:10.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,0.50);margin:0 0 8px;}
  .nx-hero__metric-value{font-family:Inter,sans-serif;font-size:30px;font-weight:800;letter-spacing:-.02em;margin:0;color:#fff;line-height:1;font-variant-numeric:tabular-nums;}
  .nx-hero__metric-value small{font-size:14px;font-weight:700;color:rgba(255,255,255,0.55);margin-left:6px;letter-spacing:-.012em;}
  .nx-hero__active{
    display:inline-flex;align-items:center;gap:8px;
    font-size:13px;font-weight:700;color:#86EFAC;letter-spacing:.04em;text-transform:uppercase;
  }
  .nx-hero__active::before{
    content:'';width:9px;height:9px;border-radius:50%;background:#22C55E;
    box-shadow:0 0 0 4px rgba(34,197,94,0.18);
    animation:nxPulse 2s ease-in-out infinite;
  }
  @keyframes nxPulse {
    0%,100%{box-shadow:0 0 0 4px rgba(34,197,94,0.18);}
    50%{box-shadow:0 0 0 8px rgba(34,197,94,0.05);}
  }

  /* Locked schedule strip */
  .nx-locked{
    margin-top:28px;padding-top:22px;
    border-top:1px solid rgba(255,255,255,0.10);
  }
  .nx-locked__head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .nx-locked__label{font-size:10.5px;font-weight:800;letter-spacing:.20em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin:0;}
  .nx-locked__count{
    background:rgba(255,255,255,0.10);color:#fff;
    font-size:10.5px;font-weight:800;letter-spacing:.06em;
    padding:3px 8px;border-radius:9999px;
  }
  .nx-locked__list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
  .nx-ticket{
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:11px;padding:13px 14px 13px 0;
    position:relative;overflow:hidden;
  }
  .nx-ticket::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
    background:linear-gradient(180deg,#5750F1,#0ABEF9);
  }
  .nx-ticket__day{
    width:46px;text-align:center;flex-shrink:0;margin-left:14px;
    border-right:1px solid rgba(255,255,255,0.08);padding-right:12px;
  }
  .nx-ticket__day-name{font-size:11px;font-weight:800;letter-spacing:.12em;color:rgba(255,255,255,0.55);text-transform:uppercase;margin:0 0 1px;}
  .nx-ticket__day-tag{font-size:9.5px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,0.40);text-transform:uppercase;margin:0;}
  .nx-ticket__body{flex:1;min-width:0;}
  .nx-ticket__time{font-size:13.5px;font-weight:700;color:#fff;margin:0;letter-spacing:-.005em;}
  .nx-ticket__dur{font-size:11px;font-weight:600;color:rgba(255,255,255,0.55);margin:3px 0 0;}

  /* Action row at bottom of hero */
  .nx-hero__actions{
    display:flex;gap:10px;margin-top:24px;
  }
  .nx-hero__btn{
    flex:1;
    background:#fff;color:#0F172A;border:none;
    padding:14px 20px;border-radius:11px;
    font:700 14px Inter,sans-serif;letter-spacing:-.005em;
    cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 8px 18px -6px rgba(0,0,0,0.35);
  }
  .nx-hero__btn:hover{transform:translateY(-1px);box-shadow:0 14px 28px -8px rgba(0,0,0,0.45);}
  .nx-hero__btn--ghost{background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.16);box-shadow:none;}
  .nx-hero__btn--ghost:hover{background:rgba(255,255,255,0.10);}
  .nx-hero__btn svg{width:14px;height:14px;stroke-width:2.6;}

  /* Pending review banner */
  .nx-pending{
    background:linear-gradient(135deg,#FEF3C7 0%,#FDE68A 100%);
    border:1px solid #F59E0B;border-radius:14px;
    padding:18px 22px;margin-bottom:22px;
    display:flex;align-items:center;gap:14px;
    box-shadow:0 6px 18px -8px rgba(245,158,11,0.4);
  }
  .nx-pending__icon{
    width:42px;height:42px;border-radius:11px;flex-shrink:0;
    background:linear-gradient(135deg,#D97706,#F59E0B);color:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 -2px 5px rgba(0,0,0,0.12);
  }
  .nx-pending__icon svg{width:20px;height:20px;stroke-width:2.4;}
  .nx-pending__body{flex:1;min-width:0;}
  .nx-pending__title{font-size:14.5px;font-weight:800;color:#78350F;margin:0;letter-spacing:-.005em;}
  .nx-pending__sub{font-size:12.5px;color:#92400E;margin:3px 0 0;font-weight:500;line-height:1.45;}

  /* Generic card */
  .nx-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;box-shadow:0 1px 2px rgba(15,23,42,0.04);}
  .nx-card__head{margin-bottom:20px;}
  .nx-card__title{font-size:20px;font-weight:800;letter-spacing:-.018em;margin:0;color:var(--ink-2);line-height:1.15;}
  .nx-card__sub{font-size:13px;color:var(--ink-mute);margin:5px 0 0;font-weight:500;}

  /* Premium pill toggle (Monthly / Yearly) */
  .nx-toggle-wrap{display:flex;justify-content:center;margin-bottom:30px;}
  .nx-pill-toggle{
    display:inline-flex;background:#F8FAFC;border:1px solid var(--border);
    border-radius:9999px;padding:5px;gap:0;position:relative;
    box-shadow:0 1px 2px rgba(15,23,42,0.04);
  }
  .nx-pill-toggle__btn{
    background:transparent;border:0;cursor:pointer;
    padding:11px 26px;border-radius:9999px;
    font:700 13.5px Inter,sans-serif;color:var(--ink-mute);letter-spacing:-.005em;
    transition:color .18s ease;position:relative;z-index:2;
    display:inline-flex;align-items:center;gap:8px;
  }
  .nx-pill-toggle__btn:hover{color:var(--ink-2);}
  .nx-pill-toggle__btn.is-active{color:#fff;}
  .nx-pill-toggle__btn[disabled]{cursor:not-allowed;}
  .nx-pill-toggle__indicator{
    position:absolute;top:5px;left:5px;height:calc(100% - 10px);
    background:linear-gradient(180deg,#5B82F8 0%,#5750F1 50%,#4338CA 100%);
    border-radius:9999px;z-index:1;
    transition:transform .35s cubic-bezier(.22,1,.36,1), width .35s cubic-bezier(.22,1,.36,1);
    box-shadow:0 6px 14px -4px rgba(87,80,241,0.45), inset 0 -2px 4px rgba(0,0,0,0.10);
  }
  .nx-toggle__save{
    background:rgba(255,255,255,0.20);color:#fff;
    font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    padding:3px 8px;border-radius:9999px;
  }
  .nx-pill-toggle__btn:not(.is-active) .nx-toggle__save{background:#DCFCE7;color:#166534;}

  /* Plan tier cards — clean white, popular = blue ring + tinted background */
  .nx-plans{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:8px;}
  .nx-plan{
    position:relative;
    background:#fff;border:1px solid var(--border);border-radius:20px;
    padding:34px 32px 30px;text-align:left;font-family:inherit;
    transition:transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s ease, border-color .25s ease;
    display:flex;flex-direction:column;
    box-shadow:0 1px 2px rgba(15,23,42,0.04);
  }
  .nx-plan:hover{transform:translateY(-3px);box-shadow:0 24px 44px -16px rgba(15,23,42,0.20);}
  .nx-plan--popular{
    border:2px solid var(--primary);
    background:linear-gradient(180deg,#EEF1FB 0%,#F8FAFF 60%);
    box-shadow:0 18px 36px -14px rgba(87,80,241,0.30);
  }
  .nx-plan__top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
  .nx-plan__title{font-size:30px;font-weight:800;color:var(--ink-2);margin:0;letter-spacing:-.025em;line-height:1.05;}
  .nx-plan__pop{
    background:linear-gradient(180deg,#5B82F8,#4338CA);color:#fff;
    padding:5px 13px;border-radius:9999px;
    font-size:11.5px;font-weight:700;letter-spacing:-.005em;
    flex-shrink:0;
    box-shadow:0 4px 10px -3px rgba(67,56,202,0.40);
  }
  .nx-plan__desc{font-size:14px;color:var(--ink-mute);margin:0 0 22px;font-weight:500;line-height:1.5;letter-spacing:-.005em;}
  .nx-plan__price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
  .nx-plan__currency{font-size:24px;font-weight:800;color:var(--ink-2);letter-spacing:-.020em;}
  .nx-plan__price{font-size:48px;font-weight:800;color:var(--ink-2);letter-spacing:-.030em;line-height:1;font-variant-numeric:tabular-nums;}
  .nx-plan__period{font-size:16px;color:var(--ink-mute);font-weight:600;letter-spacing:-.012em;}
  .nx-plan__hint{font-size:12.5px;color:var(--ink-mute);margin:0 0 22px;font-weight:500;letter-spacing:-.005em;}
  .nx-plan__hint strong{color:var(--ink-2);font-weight:700;}

  .nx-plan__btn{
    width:100%;border:none;cursor:pointer;
    padding:16px 20px;border-radius:14px;
    font:700 16px Inter,sans-serif;letter-spacing:-.012em;
    transition:transform .15s ease, box-shadow .18s ease;
    margin-bottom:24px;
  }
  .nx-plan__btn--primary{
    background:linear-gradient(180deg,#5B82F8 0%,#5750F1 50%,#4338CA 100%);color:#fff;
    box-shadow:0 12px 24px -8px rgba(87,80,241,0.55), inset 0 -2px 4px rgba(0,0,0,0.10);
    border:1px solid rgba(255,255,255,0.18);
  }
  .nx-plan__btn--ghost{
    background:linear-gradient(180deg,#1E293B 0%,#0F172A 100%);color:#fff;
    box-shadow:0 12px 24px -8px rgba(15,23,42,0.50), inset 0 -2px 4px rgba(0,0,0,0.20);
    border:1px solid rgba(255,255,255,0.10);
  }
  .nx-plan__btn:hover{transform:translateY(-1px);}
  /* Selected = same gradient, just stamped with a check + brighter shadow */
  .nx-plan__btn.is-selected{filter:brightness(1.05);box-shadow:0 16px 32px -10px rgba(0,0,0,0.30), inset 0 -2px 4px rgba(0,0,0,0.18);}
  .nx-plan__btn--primary.is-selected{box-shadow:0 16px 32px -10px rgba(87,80,241,0.65), inset 0 -2px 4px rgba(0,0,0,0.10);}

  .nx-plan__features{display:flex;flex-direction:column;gap:14px;padding:18px 0 0;border-top:1px solid var(--border);}
  .nx-plan__feat{display:flex;align-items:flex-start;gap:14px;font-size:14px;color:var(--ink);font-weight:500;letter-spacing:-.005em;line-height:1.4;}
  .nx-plan__feat-icon{
    flex-shrink:0;width:34px;height:34px;border-radius:9px;
    background:#F1F5F9;color:var(--ink-2);
    display:flex;align-items:center;justify-content:center;
  }
  .nx-plan__feat-icon svg{width:16px;height:16px;stroke-width:2.2;}
  .nx-plan__feat-text{flex:1;padding-top:7px;}

  .nx-plan__includes{display:flex;flex-direction:column;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--border);}
  .nx-plan__includes-title{font-size:14.5px;color:var(--ink-2);margin:0 0 6px;font-weight:700;letter-spacing:-.010em;}
  .nx-plan__inc{display:flex;align-items:flex-start;gap:12px;font-size:13.5px;color:var(--ink);font-weight:500;letter-spacing:-.005em;line-height:1.4;}
  .nx-plan__inc-check{
    flex-shrink:0;width:22px;height:22px;border-radius:9999px;
    background:#EFF6FF;border:1px solid var(--primary);color:var(--primary);
    display:flex;align-items:center;justify-content:center;margin-top:1px;
  }
  .nx-plan__inc-check svg{width:12px;height:12px;stroke-width:2.6;}

  /* Step bar / continue */
  .nx-stepbar{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:22px;padding-top:22px;border-top:1px solid var(--border);
  }
  .nx-stepbar__hint{font-size:13px;color:var(--ink-mute);font-weight:500;letter-spacing:-.005em;}
  .nx-btn{
    border:none;font:700 14px Inter,sans-serif;padding:12px 24px;border-radius:9999px;
    cursor:pointer;transition:transform .12s ease, background .15s ease;
    letter-spacing:-.005em;
    display:inline-flex;align-items:center;gap:7px;
  }
  .nx-btn--ghost{background:#F1F5F9;color:var(--ink-2);}
  .nx-btn--ghost:hover{background:#E2E8F0;}
  .nx-btn--primary{background:linear-gradient(135deg,#5750F1,#0ABEF9);color:#fff;box-shadow:0 6px 14px -4px rgba(87,80,241,0.4);}
  .nx-btn--primary:hover{transform:translateY(-1px);}
  .nx-btn[disabled]{opacity:.45;cursor:not-allowed;transform:none;}
  .nx-btn svg{width:13px;height:13px;stroke-width:2.6;}

  /* Schedule editor */
  .nx-slots{display:flex;flex-direction:column;gap:12px;}
  .nx-slotcard{
    display:grid;grid-template-columns:80px 1fr 1fr 110px 36px;gap:12px;
    align-items:center;
    padding:14px 16px;background:#FAFBFC;border:1px solid var(--border);border-radius:12px;
  }
  .nx-slotcard__day{font-size:12.5px;font-weight:800;color:var(--ink-2);letter-spacing:.10em;text-transform:uppercase;}
  .nx-slotcard select,.nx-slotcard input{width:100%;background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font:600 13px Inter,sans-serif;color:var(--ink-2);}
  .nx-slotcard select:focus,.nx-slotcard input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(87,80,241,0.12);}
  .nx-slot-remove{width:36px;height:36px;border-radius:8px;background:#fff;border:1px solid var(--border);color:var(--ink-mute);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .nx-slot-remove:hover{background:var(--red-soft);color:#991B1B;border-color:#FCA5A5;}
  .nx-slot-remove svg{width:14px;height:14px;stroke-width:2.4;}
  .nx-add-slot{
    background:transparent;border:1px dashed var(--border);color:var(--ink-mute);
    padding:12px 18px;border-radius:11px;font:600 13px Inter,sans-serif;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;letter-spacing:-.005em;
  }
  .nx-add-slot:hover{border-color:var(--primary);color:var(--primary);}
  .nx-add-slot svg{width:14px;height:14px;stroke-width:2.6;}

  /* Summary section */
  .nx-summary{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
  .nx-summary__col{background:#FAFBFC;border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
  .nx-summary__label{font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-tert);margin:0 0 8px;}
  .nx-summary__value{font-size:18px;font-weight:800;color:var(--ink-2);margin:0;letter-spacing:-.018em;}
  .nx-summary__hint{font-size:12.5px;color:var(--ink-mute);margin:5px 0 0;font-weight:500;}

  /* Toast */
  .nx-toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);z-index:1100;background:var(--ink-2);color:#fff;padding:13px 22px;border-radius:9999px;font:600 13.5px Inter,sans-serif;box-shadow:0 16px 36px -10px rgba(15,23,42,0.55);opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;}
  .nx-toast.is-shown{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
  .nx-toast--success{background:linear-gradient(135deg,#16A34A,#22C55E);}
  .nx-toast--error{background:linear-gradient(135deg,#DC2626,#EF4444);}

  .nx-empty{padding:48px 24px;text-align:center;background:#fff;border:1px dashed var(--border);border-radius:14px;color:var(--ink-mute);font-size:14px;font-weight:500;}

  @media (max-width:880px){
    .nx-hero{padding:28px 24px;}
    .nx-hero__row{grid-template-columns:1fr;gap:18px;}
    .nx-plans{grid-template-columns:1fr;}
    .nx-summary{grid-template-columns:1fr;}
    .nx-slotcard{grid-template-columns:60px 1fr 1fr;gap:10px;}
    .nx-slotcard__remove,.nx-slotcard select:nth-child(4){display:none;}
  }
  @media (max-width:560px){
    .nx-shell{padding:20px 16px 60px;}
    .nx-h1{font-size:24px;}
    .nx-hero__tier{font-size:26px;}
    .nx-search{display:none;}
  }
</style>
</head>
<body class="pm-has-sidebar">

<div id="pmSidebar"></div>

<header class="nx-topbar">
  <div class="nx-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" placeholder="Search…" />
  </div>
  <div class="nx-userpod">
    <span class="nx-userpod__avatar" id="nxUserAvatar">C</span>
    <span class="nx-userpod__name" id="nxUserName">Client</span>
  </div>
</header>

<main class="nx-shell">

  <header class="nx-head">
    <h1 class="nx-h1">Membership</h1>
    <p class="nx-sub">View your active plan and request changes for your next contract period.</p>
  </header>

  <div id="pendingWrap"></div>
  <div id="flowWrap"></div>

</main>

<div class="nx-toast" id="nxToast"><span id="nxToastText">Done</span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js?v=20260508d"></script>
<script src="js/hiring-service.js?v=20260508g"></script>
<script src="js/sidebar.js?v=20260508c"></script>
<script>
(async () => {
  const $ = id => document.getElementById(id);
  function esc(s){return (s||'').toString().replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  function fmtTime(t){
    if (!t) return '';
    const [h,m] = String(t).split(':');
    const hh = Number(h), mm = Number(m||0);
    const period = hh >= 12 ? 'PM' : 'AM';
    const h12 = ((hh + 11) % 12) + 1;
    return `${h12}:${String(mm).padStart(2,'0')} ${period}`;
  }
  function fmtTimeRange(startTime, durationMin){
    const start = fmtTime(startTime);
    if (!durationMin) return start;
    const [h,m] = String(startTime).split(':');
    const endTotal = (Number(h)*60 + Number(m||0)) + Number(durationMin);
    const eh = Math.floor(endTotal/60) % 24, em = endTotal % 60;
    const period = eh >= 12 ? 'PM' : 'AM';
    const h12 = ((eh + 11) % 12) + 1;
    return `${start} – ${h12}:${String(em).padStart(2,'0')} ${period}`;
  }
  function fmtDate(iso, opts){return iso ? new Date(iso).toLocaleDateString('en-CA', opts || { month:'long', day:'numeric', year:'numeric' }) : '—';}

  // Plan pricing — per-hour rate is set by the TERM:
  //   1 Month plan = $30/hour
  //   2 Month plan = $45/hour
  // Hours tier (24h or 40h) multiplies the rate. Yearly billing applies 20% off.
  const HOURLY_BY_TERM = { '1mo': 30, '2mo': 45 };
  function priceFor(planKey, isYearly) {
    const term = planKey.startsWith('2mo') ? '2mo' : '1mo';
    const months = term === '2mo' ? 2 : 1;
    const hoursTier = planKey.endsWith('40h') ? '40h' : '24h';
    const hours = hoursTier === '40h' ? 40 : 24;
    const ratePerHour = HOURLY_BY_TERM[term];
    const monthly = ratePerHour * hours; // standard monthly rate
    const yearlyMonthly = Math.round(monthly * 0.80); // 20% off when billed yearly
    return {
      months, hoursTier, hours, ratePerHour,
      monthly, yearlyMonthly,
      shownMonthly: isYearly ? yearlyMonthly : monthly,
    };
  }
  const TIER_META = {
    '24h': { name: '24 Hour Plan', desc: 'Steady support — 24 reserved hours per month.' },
    '40h': { name: '40 Hour Plan', desc: 'Premium intensive — 40 reserved hours per month with priority access.' },
  };
  // Backwards-compat lookup used by the pending banner / pending request detail
  const PRICING = {
    '1mo_24h': { tier: '24 Hour Plan', desc: '1-month term · $30/hr', monthly: 720  },
    '1mo_40h': { tier: '40 Hour Plan', desc: '1-month term · $30/hr', monthly: 1200 },
    '2mo_24h': { tier: '24 Hour Plan', desc: '2-month term · $45/hr', monthly: 1080 },
    '2mo_40h': { tier: '40 Hour Plan', desc: '2-month term · $45/hr', monthly: 1800 },
  };

  // ─── Demo mode ────────────────────────────────────────────────
  if (new URLSearchParams(location.search).get('demo') === '1') {
    const now = Date.now();
    let demoPending = null; // toggle by uncommenting line below to test pending-banner state
    // demoPending = { id:'mr-demo', client_id:'c1', current_contract_id:'k1', requested_plan_key:'2mo_40h', status:'pending', created_at: new Date(now - 1000*60*45).toISOString() };

    window.pmHiring = {
      getCurrentUser: async () => ({ id:'cstub', email:'jane@example.com' }),
      fetchCurrentUserProfile: async () => ({ full_name:'Jane Demo', role:'CLIENT' }),
      isCurrentUserAdminOrOwner: async () => false,
      signOut: async () => { location.href = 'index.html'; },
      fetchMyClientRecord: async () => ({ id:'c1', full_name:'Jane Demo', hours_balance:18.5 }),
      fetchMyActiveContract: async () => ({
        id:'k2', client_id:'c1', status:'active',
        start_at:'2026-02-15', end_at:'2026-08-15',
        included_minutes: 40 * 60, renewal_mode:'auto',
        assistant_name:'Sarah Chen',
      }),
      fetchMyRecurringPattern: async () => [
        { id:'p1', day_of_week: 1, start_time_local:'16:00:00', duration_minutes: 60 },
        { id:'p2', day_of_week: 3, start_time_local:'17:00:00', duration_minutes: 90 },
        { id:'p3', day_of_week: 6, start_time_local:'10:00:00', duration_minutes: 60 },
      ],
      fetchMyPendingMembershipRequest: async () => demoPending,
      submitMembershipChangeRequest: async () => {
        await new Promise(r => setTimeout(r, 700));
        return { id:'mr-demo-' + Math.random().toString(36).slice(2,8), status:'pending' };
      },
    };
    document.addEventListener('DOMContentLoaded', () => {
      const bar = document.createElement('div');
      bar.textContent = 'Demo mode — fake data. Remove ?demo=1 from the URL to exit.';
      bar.style.cssText = 'position:fixed;bottom:14px;right:14px;z-index:9999;background:#5750F1;color:#fff;font:600 12px Inter,sans-serif;padding:10px 14px;border-radius:9999px;box-shadow:0 8px 24px -6px rgba(87,80,241,0.45);';
      document.body.appendChild(bar);
    });
  }

  // Auth gate
  const user = await window.pmHiring.getCurrentUser();
  if (!user) { window.location.href = 'signin.html'; return; }
  const profile = await window.pmHiring.fetchCurrentUserProfile().catch(() => null);
  const fullName = profile?.full_name || user.email?.split('@')[0] || 'Client';
  const firstName = fullName.split(' ')[0];
  $('nxUserName').textContent = firstName;
  $('nxUserAvatar').textContent = (firstName[0] || 'C').toUpperCase();

  // Toast
  let toastTimer = null;
  function showToast(text, kind='success'){
    const t = $('nxToast');
    $('nxToastText').textContent = text;
    t.classList.remove('nx-toast--error','nx-toast--success');
    t.classList.add(kind === 'error' ? 'nx-toast--error' : 'nx-toast--success');
    t.classList.add('is-shown');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('is-shown'), 3500);
  }

  // Pull data
  const [contract, pending] = await Promise.all([
    window.pmHiring.fetchMyActiveContract().catch(()=>null),
    window.pmHiring.fetchMyPendingMembershipRequest().catch(()=>null),
  ]);
  const client = await window.pmHiring.fetchMyClientRecord().catch(()=>null);
  const pattern = contract ? await window.pmHiring.fetchMyRecurringPattern(contract.id).catch(()=>[]) : [];

  // ─── Pending review banner ────────────────────────────────────
  if (pending) {
    const clockIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
    $('pendingWrap').innerHTML = `<div class="nx-pending">
      <div class="nx-pending__icon">${clockIcon}</div>
      <div class="nx-pending__body">
        <p class="nx-pending__title">Membership change under review</p>
        <p class="nx-pending__sub">Your request to switch to <strong>${esc(PRICING[pending.requested_plan_key]?.tier || pending.requested_plan_key)}</strong> is being reviewed by your admin. You'll be notified when it's approved.</p>
      </div>
    </div>`;
  }

  // (Hero/contract details now live on client-contract.html — Contract Details page.)

  // ─── State for the change flow ────────────────────────────────
  const state = {
    isYearly: false,      // Monthly | Yearly (Yearly = 20% off)
    duration: '1 Month',  // '1 Month' | '2 Months'  (term length for membership_change_requests)
    tier: '40h',          // '24h' | '40h'
    schedule: (pattern || []).map(p => ({
      day_of_week: Number(p.day_of_week),
      start_time_local: String(p.start_time_local || '17:00:00').slice(0,5),
      duration_minutes: Number(p.duration_minutes || 60),
      timezone: p.timezone || 'America/Vancouver',
    })),
  };
  function planKey(){ return `${state.duration === '2 Months' ? '2mo' : '1mo'}_${state.tier}`; }

  // Always render the picker on load (no hidden behind a button).
  function renderPlanPicker(){
    const html = `
      <section class="nx-card" style="margin-top:22px;">
        <div class="nx-card__head" style="text-align:center;margin-bottom:6px;">
          <h2 class="nx-card__title" style="font-size:26px;letter-spacing:-.022em;">${pending ? 'Plans available for your next contract' : 'Choose your plan'}</h2>
          <p class="nx-card__sub" style="font-size:14px;margin-top:8px;">${contract?.end_at
            ? `Your current plan stays active until ${esc(fmtDate(contract.end_at, { month:'long', day:'numeric' }))}. The new plan takes effect after that.`
            : 'Pick a tier to get started — your assistant will help you onboard once approved.'}</p>
        </div>

        <div class="nx-toggle-wrap" style="flex-direction:column;gap:12px;align-items:center;">
          <div class="nx-pill-toggle" id="cycleToggle">
            <span class="nx-pill-toggle__indicator" id="cycleIndicator"></span>
            <button class="nx-pill-toggle__btn ${state.isYearly?'is-active':''}" data-cycle="yearly" type="button">Yearly</button>
            <button class="nx-pill-toggle__btn ${!state.isYearly?'is-active':''}" data-cycle="monthly" type="button">Quarterly</button>
          </div>
          <div class="nx-pill-toggle" id="termToggle">
            <span class="nx-pill-toggle__indicator" id="termIndicator"></span>
            <button class="nx-pill-toggle__btn ${state.duration==='1 Month'?'is-active':''}" data-term="1 Month" type="button">1 Month</button>
            <button class="nx-pill-toggle__btn ${state.duration==='2 Months'?'is-active':''}" data-term="2 Months" type="button">2 Months</button>
          </div>
        </div>

        <div class="nx-plans" id="planCards"></div>

        <div class="nx-stepbar" style="justify-content:center;flex-direction:column;gap:14px;border-top:0;padding-top:8px;">
          <span class="nx-stepbar__hint">Selected: <strong style="color:var(--ink-2);" id="selectedLabel">—</strong></span>
          <button class="nx-btn nx-btn--primary" id="continueToSchedule" type="button" style="padding:14px 32px;">
            Continue to schedule
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </section>
    `;
    $('flowWrap').innerHTML = html;
    renderPlanCards();
    positionToggleIndicator();
    document.querySelectorAll('#cycleToggle .nx-pill-toggle__btn').forEach(b => b.addEventListener('click', () => {
      state.isYearly = b.dataset.cycle === 'yearly';
      renderPlanPicker();
    }));
    document.querySelectorAll('#termToggle .nx-pill-toggle__btn').forEach(b => b.addEventListener('click', () => {
      state.duration = b.dataset.term;
      renderPlanPicker();
    }));
    document.getElementById('continueToSchedule').addEventListener('click', renderScheduleEditor);
  }

  function positionToggleIndicator(){
    [['cycleIndicator', 'cycleToggle', state.isYearly ? 0 : 1],
     ['termIndicator',  'termToggle',  state.duration === '2 Months' ? 1 : 0]].forEach(([indId, togId, idx]) => {
      const indicator = document.getElementById(indId);
      const buttons = document.querySelectorAll(`#${togId} .nx-pill-toggle__btn`);
      const active = buttons[idx];
      if (!active || !indicator) return;
      indicator.style.width = active.offsetWidth + 'px';
      indicator.style.transform = `translateX(${active.offsetLeft - 5}px)`;
    });
  }

  function renderPlanCards(){
    const cards = ['24h','40h'].map(tier => {
      const key = `${state.duration === '2 Months' ? '2mo' : '1mo'}_${tier}`;
      const p = priceFor(key, state.isYearly);
      const meta = TIER_META[tier];
      const isPopular = tier === '40h';
      const isSelected = state.tier === tier;
      const features = tier === '40h'
        ? [
            { icon:'briefcase', text:`<strong>40 reserved hours</strong> per month — up to 4 sessions per week` },
            { icon:'shield',    text:`Priority assistant matching with senior tier mentors` },
            { icon:'lightning', text:`<strong>$${p.ratePerHour}/hour</strong> blended rate, locked for the full term` },
          ]
        : [
            { icon:'briefcase', text:`<strong>24 reserved hours</strong> per month — up to 3 sessions per week` },
            { icon:'shield',    text:`Dedicated assistant matched to your goals` },
            { icon:'lightning', text:`<strong>$${p.ratePerHour}/hour</strong> blended rate, locked for the full term` },
          ];
      const includes = tier === '40h'
        ? ['Everything in Standard, plus:', 'Priority scheduling window', 'Same-day rescheduling on Mon–Thu', 'Quarterly progress review with the team']
        : ['Standard membership includes:', 'Hours protected by contract', '24h advance cancel/reschedule', 'Monthly progress review'];

      const ICONS = {
        briefcase: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',
        shield:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
        lightning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
      };
      const checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

      return `<div class="nx-plan${isPopular ? ' nx-plan--popular' : ''}">
        <div class="nx-plan__top">
          <h3 class="nx-plan__title">${esc(meta.name)}</h3>
          ${isPopular ? `<span class="nx-plan__pop">Popular</span>` : ''}
        </div>
        <p class="nx-plan__desc">${esc(meta.desc)}</p>
        <div class="nx-plan__price-row">
          <span class="nx-plan__currency">$</span>
          <span class="nx-plan__price">${p.shownMonthly.toLocaleString('en-CA')}</span>
          <span class="nx-plan__period">/${state.isYearly ? 'mo' : 'mo'}</span>
        </div>
        <p class="nx-plan__hint">${state.isYearly
            ? `<strong>$${(p.shownMonthly * 12).toLocaleString('en-CA')}/year</strong> billed annually · 20% saved`
            : `<strong>$${p.monthly.toLocaleString('en-CA')}/month</strong> billed monthly`} · CAD</p>
        <button class="nx-plan__btn ${isPopular ? 'nx-plan__btn--primary' : 'nx-plan__btn--ghost'}${isSelected ? ' is-selected' : ''}" type="button" data-tier="${tier}">
          ${isSelected ? '✓ Selected' : 'Choose this plan'}
        </button>
        <div class="nx-plan__features">
          ${features.map(f => `<div class="nx-plan__feat">
            <span class="nx-plan__feat-icon">${ICONS[f.icon]}</span>
            <span class="nx-plan__feat-text">${f.text}</span>
          </div>`).join('')}
        </div>
        <div class="nx-plan__includes">
          <p class="nx-plan__includes-title">${esc(includes[0])}</p>
          ${includes.slice(1).map(i => `<div class="nx-plan__inc">
            <span class="nx-plan__inc-check">${checkIcon}</span>
            <span>${esc(i)}</span>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('');
    document.getElementById('planCards').innerHTML = cards;
    document.querySelectorAll('.nx-plan__btn[data-tier]').forEach(btn => {
      btn.addEventListener('click', () => { state.tier = btn.dataset.tier; renderPlanCards(); updateSelectedLabel(); });
    });
    updateSelectedLabel();
  }

  function updateSelectedLabel(){
    const lbl = document.getElementById('selectedLabel');
    if (!lbl) return;
    const meta = TIER_META[state.tier];
    const p = priceFor(planKey(), state.isYearly);
    lbl.textContent = `${meta.name} · $${p.shownMonthly}/mo (${state.isYearly ? 'yearly' : 'monthly'})`;
  }

  function renderScheduleEditor(){
    const p = PRICING[planKey()];
    const slotsHtml = state.schedule.map((s, i) => {
      const dayOpts = DAY_NAMES.map((n, di) => `<option value="${di}" ${Number(s.day_of_week)===di?'selected':''}>${n}day</option>`).join('');
      const durOpts = [60,90,120,150,180].map(d => `<option value="${d}" ${Number(s.duration_minutes)===d?'selected':''}>${d} min</option>`).join('');
      const timeVal = String(s.start_time_local).slice(0,5);
      return `<div class="nx-slotcard" data-i="${i}">
        <div class="nx-slotcard__day">Slot ${i+1}</div>
        <select data-field="day_of_week">${dayOpts}</select>
        <input type="time" data-field="start_time_local" value="${esc(timeVal)}" />
        <select data-field="duration_minutes">${durOpts}</select>
        <button class="nx-slot-remove" type="button" data-action="remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('');

    const monthlyDisplay = state.commitment === 'Yearly' ? Math.round(p.monthly * 0.95) : p.monthly;

    $('flowWrap').innerHTML = `<section class="nx-card" style="margin-top:22px;">
      <div class="nx-card__head">
        <h2 class="nx-card__title">Confirm your new schedule</h2>
        <p class="nx-card__sub">Adjust your reserved weekly slots. These take effect when your new contract starts.</p>
      </div>

      <div class="nx-summary">
        <div class="nx-summary__col">
          <p class="nx-summary__label">New Plan</p>
          <p class="nx-summary__value">${esc(p.tier)}</p>
          <p class="nx-summary__hint">${esc(p.desc)}</p>
        </div>
        <div class="nx-summary__col">
          <p class="nx-summary__label">Billing</p>
          <p class="nx-summary__value">CAD$ ${monthlyDisplay.toLocaleString('en-CA')}/mo</p>
          <p class="nx-summary__hint">${esc(state.commitment)} · ${esc(state.duration)} term</p>
        </div>
      </div>

      <div class="nx-slots" id="slotList">${slotsHtml}</div>
      <button class="nx-add-slot" type="button" id="addSlotBtn" style="margin-top:12px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add a slot
      </button>

      <div class="nx-stepbar">
        <button class="nx-btn nx-btn--ghost" type="button" id="backBtn">Back</button>
        <button class="nx-btn nx-btn--primary" type="button" id="submitMembershipBtn">
          Submit change request
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
    </section>`;

    bindSlotEvents();
    document.getElementById('addSlotBtn').addEventListener('click', () => {
      state.schedule.push({ day_of_week: 1, start_time_local: '17:00', duration_minutes: 60, timezone: 'America/Vancouver' });
      renderScheduleEditor();
    });
    document.getElementById('backBtn').addEventListener('click', renderPlanPicker);
    document.getElementById('submitMembershipBtn').addEventListener('click', submitChange);
    $('flowWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function bindSlotEvents(){
    document.querySelectorAll('#slotList .nx-slotcard').forEach(card => {
      const i = Number(card.dataset.i);
      card.querySelectorAll('select, input').forEach(el => {
        el.addEventListener('change', () => {
          const field = el.dataset.field;
          if (field === 'day_of_week') state.schedule[i].day_of_week = Number(el.value);
          else if (field === 'duration_minutes') state.schedule[i].duration_minutes = Number(el.value);
          else state.schedule[i][field] = el.value;
        });
      });
      card.querySelector('[data-action="remove"]').addEventListener('click', () => {
        state.schedule.splice(i, 1);
        renderScheduleEditor();
      });
    });
  }

  async function submitChange(){
    if (!state.schedule.length) { showToast('Add at least one slot before submitting', 'error'); return; }
    const btn = document.getElementById('submitMembershipBtn');
    btn.disabled = true; btn.textContent = 'Submitting…';
    try {
      const normalized = state.schedule.map(s => ({
        day_of_week: Number(s.day_of_week),
        start_time_local: String(s.start_time_local).length === 5 ? String(s.start_time_local) + ':00' : String(s.start_time_local),
        duration_minutes: Number(s.duration_minutes),
        timezone: s.timezone || 'America/Vancouver',
      }));
      await window.pmHiring.submitMembershipChangeRequest({
        planKey: planKey(),
        schedule: normalized,
        currentContractId: contract?.id || null,
      });
      $('flowWrap').innerHTML = '';
      showToast('Membership change submitted — your admin will review it.');
      // Soft refresh to show pending banner
      setTimeout(() => location.reload(), 1500);
    } catch (e) {
      btn.disabled = false; btn.innerHTML = 'Submit change request <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>';
      showToast(e?.message || 'Failed to submit', 'error');
    }
  }

  function renderPendingDetail(){
    const p = PRICING[pending.requested_plan_key];
    $('flowWrap').innerHTML = `<section class="nx-card" style="margin-top:22px;">
      <div class="nx-card__head">
        <h2 class="nx-card__title">Pending request</h2>
        <p class="nx-card__sub">Submitted ${esc(fmtDate(pending.created_at, { month:'long', day:'numeric', year:'numeric' }))}. Awaiting admin review.</p>
      </div>
      <div class="nx-summary">
        <div class="nx-summary__col">
          <p class="nx-summary__label">Requested Plan</p>
          <p class="nx-summary__value">${esc(p?.tier || pending.requested_plan_key)}</p>
          <p class="nx-summary__hint">${esc(p?.desc || '')}</p>
        </div>
        <div class="nx-summary__col">
          <p class="nx-summary__label">Status</p>
          <p class="nx-summary__value" style="color:#9A3412;">Pending review</p>
          <p class="nx-summary__hint">You'll be notified once approved.</p>
        </div>
      </div>
    </section>`;
    $('flowWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Always render the picker by default. (If a request is pending, the user can
  // still browse plans, but the submit will hit the duplicate-request guard.)
  renderPlanPicker();
  // Re-position the toggle indicator after layout settles.
  setTimeout(positionToggleIndicator, 80);
  window.addEventListener('resize', positionToggleIndicator);
})();
</script>
