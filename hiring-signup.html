<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account — Private Mentorship</title>
<meta name="description" content="Create your account to apply for a Private Mentorship Assistant role." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Archivo:wght@500;600;700;800;900&family=Playfair+Display:ital,wght@1,400;1,500;1,600&display=swap" />
<link rel="stylesheet" href="js/auth-shell.css?v=20260507a" />
<link rel="icon" href="assets/logos/pm-logo.png" />
</head>
<body>

<nav class="auth-nav">
  <a class="auth-nav__logo" href="hiring.html">Private Mentorship</a>
  <div class="auth-nav__links">
    <a href="hiring.html">Hiring</a>
    <a href="the-assistant.html">The Assistant</a>
  </div>
</nav>

<main class="auth-shell">
  <div class="auth-card">
    <p class="auth-eyebrow">Step 1 — Create your account</p>
    <h1 class="auth-title">Create your <em>account</em></h1>
    <p class="auth-sub">You'll use this to save and resume your application.</p>

    <div class="auth-error" id="suError"></div>
    <div class="auth-success" id="suSuccess"></div>

    <form id="suForm" novalidate>
      <label class="auth-label auth-label--top" for="suEmail">Email</label>
      <input class="auth-input" id="suEmail" type="email" autocomplete="email" placeholder="you@example.com" required />

      <label class="auth-label" for="suPassword">Password</label>
      <input class="auth-input" id="suPassword" type="password" autocomplete="new-password" placeholder="At least 8 characters" required minlength="8" />
      <p class="auth-helper">Use 8 or more characters with a mix of letters and numbers.</p>

      <label class="auth-label" for="suPassword2">Confirm password</label>
      <input class="auth-input" id="suPassword2" type="password" autocomplete="new-password" placeholder="Re-type your password" required />

      <button type="submit" class="auth-btn" id="suSubmit">
        <span id="suSubmitLabel">Create account</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p class="auth-foot">Already have an account? <a href="hiring-login.html">Sign in</a></p>

    <a class="auth-back" href="hiring-entry.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back
    </a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js?v=20260507a"></script>
<script src="js/hiring-service.js?v=20260507a"></script>
<script>
const form = document.getElementById('suForm');
const errEl = document.getElementById('suError');
const okEl = document.getElementById('suSuccess');
const submitBtn = document.getElementById('suSubmit');
const submitLabel = document.getElementById('suSubmitLabel');

function showError(msg){ errEl.textContent = msg; errEl.classList.add('is-shown'); okEl.classList.remove('is-shown'); }
function showSuccess(msg){ okEl.textContent = msg; okEl.classList.add('is-shown'); errEl.classList.remove('is-shown'); }
function clearMessages(){ errEl.classList.remove('is-shown'); okEl.classList.remove('is-shown'); }

(async () => {
  // Already signed in? Skip ahead.
  const user = await window.pmHiring.getCurrentUser();
  if (user) window.location.href = 'hiring-entry.html';
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessages();

  const email = document.getElementById('suEmail').value.trim();
  const pw = document.getElementById('suPassword').value;
  const pw2 = document.getElementById('suPassword2').value;

  if (!email || !pw) { showError('Please fill in every field.'); return; }
  if (pw.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (pw !== pw2) { showError("The two passwords don't match."); return; }

  submitBtn.disabled = true;
  submitLabel.innerHTML = '<span class="auth-spinner"></span> Creating account…';

  try {
    const result = await window.pmHiring.signUpApplicant({ email, password: pw });
    // Production may have email confirmation enabled, in which case session is null until verified.
    if (!result.session) {
      window.location.href = `hiring-verify.html?email=${encodeURIComponent(email)}`;
      return;
    }
    // Auto-confirmed (no email gate) — bootstrap their applicant draft and route to wizard.
    try { await window.pmHiring.ensureApplicantDraft(); } catch (_) {}
    window.location.href = 'hiring-apply.html';
  } catch (err) {
    console.error(err);
    let msg = err?.message || 'Could not create account.';
    if (/already registered|user already/i.test(msg)) {
      msg = 'An account with this email already exists. Try signing in instead.';
    }
    showError(msg);
    submitBtn.disabled = false;
    submitLabel.textContent = 'Create account';
  }
});
</script>

</body>
</html>
