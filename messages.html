<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messages — Private Mentorship</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
<link rel="stylesheet" href="js/sidebar.css?v=20260512a" />
<!-- theme.js intentionally NOT loaded — messages has its own pearl/dark
     theme system (body.theme-light) and the user wants it left alone. -->
<link rel="icon" href="assets/logos/pm-logo.png" />
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#F1F5F9;color:#1F2937;font-family:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;height:100%;overflow:hidden;}
  :root{
    --bg:#F1F5F9;
    --card:#FFFFFF;
    --border:#E2E8F0;
    --border-soft:#EEF2F7;
    --ink:#1F2937;
    --ink-2:#0F172A;
    --ink-mute:#64748B;
    --ink-tert:#94A3B8;
    --primary:#5750F1;
    --primary-soft:#EEF1FB;
    --bubble-self:#5750F1;
    --bubble-self-ink:#FFFFFF;
    --bubble-other:#FFFFFF;
    --bubble-other-ink:#0F172A;
    --system-bg:linear-gradient(180deg,#EEF6FF 0%,#FFFFFF 100%);
  }

  /* Topbar: floating overlay on top of the dark thread pane (no white
     bar — the elements live inside the dark area as glass pills). */
  .nx-topbar{
    background:transparent;border-bottom:none;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;gap:16px;
    position:absolute;top:0;left:0;right:0;
    z-index:20;
    pointer-events:none;
  }
  .nx-topbar > *{pointer-events:auto;}
  .nx-topbar__title{display:none;}
  .nx-userpod{
    display:flex;align-items:center;gap:10px;
    padding:5px 12px 5px 5px;
    border:1px solid rgba(255,255,255,0.10);
    border-radius:9999px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  }
  .nx-userpod__avatar{
    width:32px;height:32px;border-radius:50%;
    background:linear-gradient(135deg,#5750F1,#9F75FF);
    color:#fff;font-weight:700;font-size:13px;
    display:flex;align-items:center;justify-content:center;
  }
  .nx-userpod__name{font-size:13px;font-weight:700;color:rgba(255,255,255,0.92);}

  /* Page = full-bleed; topbar is now an absolute overlay so the shell
     fills the entire viewport. */
  .pm-msg-shell{
    display:grid;
    grid-template-columns:340px 1fr;
    height:100vh;
    background:#fff;
    border-top:none;
    transition:grid-template-columns .38s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .pm-msg-shell.is-inbox-collapsed{grid-template-columns:0 1fr;}

  /* ─── INBOX (left column) ────────────────────────────────────────── */
  .pm-msg-inbox{
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    background:#FAFBFD;
    min-height:0;
    overflow:hidden;
    transition:transform .38s cubic-bezier(0.4, 0, 0.2, 1), opacity .25s ease;
  }
  .pm-msg-shell.is-inbox-collapsed .pm-msg-inbox{
    transform:translateX(-100%);
    opacity:0;
    pointer-events:none;
  }

  /* Toggle button in the topbar — glass on dark */
  .pm-msg-inbox-toggle{
    display:flex;align-items:center;gap:8px;
    padding:7px 13px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:9999px;
    font:600 13px Inter,sans-serif;color:rgba(255,255,255,0.78);
    cursor:pointer;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .pm-msg-inbox-toggle:hover{background:rgba(255,255,255,0.12);color:#fff;}
  .pm-msg-inbox-toggle.is-active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 14px -6px rgba(87,80,241,0.55);}
  .pm-msg-inbox-toggle.is-active:hover{background:#4842D6;}
  .pm-msg-inbox-toggle svg{width:15px;height:15px;}
  .pm-msg-inbox-toggle .pm-msg-inbox-toggle__count{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:20px;height:20px;padding:0 6px;border-radius:9999px;
    background:rgba(255,255,255,0.14);
    color:rgba(255,255,255,0.92);
    font:700 11px Inter,sans-serif;
  }
  .pm-msg-inbox-toggle.is-active .pm-msg-inbox-toggle__count{background:rgba(255,255,255,0.22);color:#fff;}
  /* ── Conversations panel: premium iMessage-grade list ──────────── */
  .pm-msg-inbox__head{
    padding:20px 18px 14px;
    border-bottom:1px solid rgba(15,23,42,0.05);
    background:transparent;
    flex:0 0 auto;
  }
  .pm-msg-inbox__title{
    font:700 17px/1 Inter,sans-serif;letter-spacing:-.018em;
    color:var(--ink-2);margin:0 0 12px;
  }
  .pm-msg-search{position:relative;}
  .pm-msg-search input{
    width:100%;
    background:rgba(15,23,42,0.04);
    border:1px solid transparent;
    border-radius:10px;
    padding:8px 12px 8px 34px;
    font:500 13px Inter,sans-serif;color:var(--ink);
    transition:background .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .pm-msg-search input::placeholder{color:var(--ink-tert);}
  .pm-msg-search input:focus{
    outline:none;
    background:#fff;
    border-color:rgba(87,80,241,0.30);
    box-shadow:0 0 0 3px rgba(87,80,241,0.10);
  }
  .pm-msg-search svg{
    position:absolute;left:11px;top:50%;transform:translateY(-50%);
    width:14px;height:14px;color:var(--ink-tert);pointer-events:none;
  }

  .pm-msg-inbox__list{flex:1;overflow-y:auto;padding:8px 8px 24px;}
  .pm-msg-inbox__list::-webkit-scrollbar{width:6px;}
  .pm-msg-inbox__list::-webkit-scrollbar-thumb{background:rgba(15,23,42,0.10);border-radius:9999px;}
  .pm-msg-inbox__list::-webkit-scrollbar-track{background:transparent;}

  .pm-msg-row{
    position:relative;
    display:flex;gap:11px;align-items:center;
    padding:9px 10px;border-radius:9px;
    cursor:pointer;
    transition:background .12s ease;
    margin-bottom:1px;
  }
  .pm-msg-row:hover{background:rgba(15,23,42,0.035);}
  .pm-msg-row.is-active{
    background:rgba(87,80,241,0.08);
  }
  /* Subtle violet accent bar on the active row */
  .pm-msg-row.is-active::before{
    content:"";position:absolute;left:0;top:10px;bottom:10px;
    width:3px;border-radius:0 3px 3px 0;
    background:var(--primary);
  }

  .pm-msg-row__avatar{
    width:38px;height:38px;border-radius:50%;flex:none;
    background:linear-gradient(135deg,#A78BFA 0%,#5750F1 100%);
    color:#fff;font-weight:700;font-size:13.5px;letter-spacing:-.005em;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 2px rgba(15,23,42,0.10);
  }
  .pm-msg-row__body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .pm-msg-row__top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .pm-msg-row__title{
    font:600 13.5px/1.2 Inter,sans-serif;letter-spacing:-.005em;
    color:var(--ink-2);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .pm-msg-row.is-active .pm-msg-row__title{font-weight:700;color:#3730A3;}
  .pm-msg-row__time{
    font:500 11.5px/1 Inter,sans-serif;color:var(--ink-tert);
    flex:none;
  }
  .pm-msg-row.is-active .pm-msg-row__time{color:#5750F1;}
  /* Drop the chunky type pill in favour of a clean one-line preview;
     the conversation title already conveys the type. */
  .pm-msg-row__meta{display:none;}
  .pm-msg-row__preview{
    font:500 12.5px/1.35 Inter,sans-serif;color:var(--ink-mute);
    margin:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  /* Dark theme variant for the conversations panel — applies whenever
     body does NOT have .theme-light (i.e., default dark messenger). */
  body:not(.theme-light) .pm-msg-inbox{
    background:rgba(20,20,30,0.92);
    border-right-color:rgba(255,255,255,0.06);
    backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  }
  body:not(.theme-light) .pm-msg-inbox__head{
    border-bottom-color:rgba(255,255,255,0.05);
  }
  body:not(.theme-light) .pm-msg-inbox__title{color:rgba(255,255,255,0.94);}
  body:not(.theme-light) .pm-msg-search input{
    background:rgba(255,255,255,0.06);
    color:rgba(255,255,255,0.92);
    border-color:transparent;
  }
  body:not(.theme-light) .pm-msg-search input::placeholder{color:rgba(255,255,255,0.40);}
  body:not(.theme-light) .pm-msg-search input:focus{
    background:rgba(255,255,255,0.10);
    border-color:rgba(167,139,250,0.55);
    box-shadow:0 0 0 3px rgba(87,80,241,0.22);
  }
  body:not(.theme-light) .pm-msg-search svg{color:rgba(255,255,255,0.42);}
  body:not(.theme-light) .pm-msg-inbox__list::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,0.10);
  }
  body:not(.theme-light) .pm-msg-row:hover{background:rgba(255,255,255,0.05);}
  body:not(.theme-light) .pm-msg-row.is-active{background:rgba(87,80,241,0.20);}
  body:not(.theme-light) .pm-msg-row__title{color:rgba(255,255,255,0.92);}
  body:not(.theme-light) .pm-msg-row.is-active .pm-msg-row__title{color:#fff;}
  body:not(.theme-light) .pm-msg-row__time{color:rgba(255,255,255,0.42);}
  body:not(.theme-light) .pm-msg-row.is-active .pm-msg-row__time{color:#C4B5FD;}
  body:not(.theme-light) .pm-msg-row__preview{color:rgba(255,255,255,0.55);}
  body:not(.theme-light) .pm-msg-row__avatar{
    box-shadow:0 1px 0 rgba(255,255,255,0.06) inset, 0 4px 14px -8px rgba(87,80,241,0.55);
  }
  body:not(.theme-light) .pm-msg-empty{color:rgba(255,255,255,0.5);}

  .pm-msg-empty{padding:60px 30px;text-align:center;color:var(--ink-mute);font-size:13px;}

  /* ─── THREAD (right column) ──────────────────────────────────────── */
  .pm-msg-thread{
    display:flex;flex-direction:column;min-height:0;
    background:radial-gradient(ellipse 80% 70% at 50% 65%, #15152A 0%, #0A0A14 55%, #06060C 100%);
    position:relative;
    overflow:hidden; /* clip the aurora glow pseudo-elements that extend past the pane */
  }
  /* Ambient blobs across the whole right pane */
  .pm-msg-thread::before, .pm-msg-thread::after{
    content:"";position:absolute;border-radius:50%;filter:blur(120px);pointer-events:none;
    z-index:0;
  }
  .pm-msg-thread::before{
    top:18%;left:22%;width:380px;height:380px;
    background:rgba(139,92,246,0.16);
    animation:pmGlowA 9s ease-in-out infinite;
  }
  .pm-msg-thread::after{
    bottom:14%;right:18%;width:420px;height:420px;
    background:rgba(99,102,241,0.16);
    animation:pmGlowB 11s ease-in-out infinite;
  }
  /* Empty mode: center composer block vertically */
  .pm-msg-thread.is-empty{justify-content:center;align-items:center;padding:32px;}
  .pm-msg-thread.is-empty .pm-msg-composer{
    background:transparent;border-top:none;padding:0;
    width:100%;max-width:760px;
  }
  .pm-msg-thread.is-empty .pm-msg-composer::before,
  .pm-msg-thread.is-empty .pm-msg-composer::after{display:none;}

  /* In-thread mode: messages list on top, composer at bottom */
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__list{
    background:#FAFBFD;flex:1;
  }
  .pm-msg-thread__head{
    padding:14px 22px;
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:14px;
    background:#fff;
  }
  .pm-msg-thread__back{display:none;border:none;background:none;cursor:pointer;color:var(--ink-mute);padding:6px;border-radius:8px;}
  .pm-msg-thread__back:hover{background:#F1F5F9;color:var(--ink-2);}
  .pm-msg-thread__avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#475569 0%,#1F2937 100%);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:14px;flex:none;}
  .pm-msg-thread__title{font-size:15px;font-weight:700;color:var(--ink-2);margin:0;letter-spacing:-.005em;}
  .pm-msg-thread__sub{font-size:12px;color:var(--ink-mute);margin:2px 0 0;font-weight:500;}
  .pm-msg-thread__actions{margin-left:auto;display:flex;gap:6px;}
  .pm-msg-thread__icon-btn{
    width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--ink-mute);
    transition:background .15s ease,color .15s ease,border-color .15s ease;
  }
  .pm-msg-thread__icon-btn:hover{background:var(--primary-soft);color:var(--primary);border-color:#CFD8FA;}
  .pm-msg-thread__icon-btn svg{width:17px;height:17px;}
  .pm-msg-thread__icon-btn[disabled]{opacity:.4;cursor:not-allowed;}

  .pm-msg-thread__list{flex:1;overflow-y:auto;padding:22px 22px 12px;background:#FAFBFD;}
  .pm-msg-day{
    display:flex;align-items:center;gap:14px;
    margin:18px 0 12px;color:var(--ink-tert);font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  }
  .pm-msg-day:before, .pm-msg-day:after{content:"";flex:1;height:1px;background:var(--border-soft);}

  .pm-msg-bubble-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-end;}
  .pm-msg-bubble-row.is-self{flex-direction:row-reverse;}
  .pm-msg-bubble-avatar{width:30px;height:30px;border-radius:50%;background:#475569;color:#fff;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;flex:none;}
  .pm-msg-bubble-row.is-self .pm-msg-bubble-avatar{visibility:hidden;}
  .pm-msg-bubble-row.is-stack .pm-msg-bubble-avatar{visibility:hidden;}
  .pm-msg-bubble{
    max-width:60%;
    padding:10px 14px;
    border-radius:16px;
    background:var(--bubble-other);
    color:var(--bubble-other-ink);
    font-size:14px;line-height:1.45;font-weight:500;
    border:1px solid var(--border);
    box-shadow:0 1px 0 rgba(15,23,42,0.02);
    position:relative;
    word-wrap:break-word;
  }
  .pm-msg-bubble-row.is-self .pm-msg-bubble{
    background:var(--bubble-self);color:var(--bubble-self-ink);border-color:transparent;
    border-bottom-right-radius:6px;
  }
  .pm-msg-bubble-row:not(.is-self) .pm-msg-bubble{
    border-bottom-left-radius:6px;
  }
  .pm-msg-sender{font-size:11.5px;font-weight:700;color:var(--ink-mute);margin-bottom:4px;letter-spacing:-.005em;}
  .pm-msg-bubble-row.is-self .pm-msg-sender{display:none;}
  .pm-msg-subject{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--primary);margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid rgba(87,80,241,0.18);}
  .pm-msg-bubble-row.is-self .pm-msg-subject{color:rgba(255,255,255,0.9);border-bottom-color:rgba(255,255,255,0.3);}
  .pm-msg-time{font-size:10.5px;color:var(--ink-tert);margin-top:4px;text-align:right;font-weight:500;}
  .pm-msg-bubble-row.is-self .pm-msg-time{color:rgba(255,255,255,0.75);}
  .pm-msg-reaction{position:absolute;bottom:-12px;background:#fff;border:1px solid var(--border);border-radius:9999px;padding:2px 7px;font-size:13px;line-height:1;box-shadow:0 2px 4px rgba(15,23,42,0.06);}
  .pm-msg-bubble-row:not(.is-self) .pm-msg-reaction{right:-6px;}
  .pm-msg-bubble-row.is-self .pm-msg-reaction{left:-6px;}

  /* System message card (matches app's premium feel) */
  .pm-msg-system{
    margin:24px auto;max-width:560px;
    background:var(--system-bg);
    border:1px solid #C9DFFF;border-radius:14px;
    box-shadow:0 8px 24px -12px rgba(36,68,125,0.18);
    overflow:hidden;
  }
  .pm-msg-system__head{
    display:flex;align-items:center;gap:8px;
    padding:11px 16px;
    background:rgba(255,255,255,0.6);
    border-bottom:1px solid #DAE7F8;
    color:#3252A0;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  }
  .pm-msg-system__head svg{width:14px;height:14px;}
  .pm-msg-system__title{padding:14px 18px 4px;font-size:15px;font-weight:800;letter-spacing:-.012em;color:#0F172A;}
  .pm-msg-system__body{padding:0 18px 14px;font-size:13.5px;line-height:1.55;color:#334155;white-space:pre-wrap;}
  .pm-msg-system__foot{padding:10px 18px;border-top:1px dashed #C9DFFF;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:#5B7CC0;display:flex;align-items:center;gap:7px;}
  .pm-msg-system__foot svg{width:12px;height:12px;}

  /* ─── Composer area (dark glass, mirrors AnimatedAIChat from 21st.dev) ─── */
  .pm-msg-composer{
    position:relative;
    padding:30px 28px 34px;
    background:radial-gradient(ellipse 80% 60% at 50% 100%, #15152A 0%, #0A0A14 60%, #06060C 100%);
    border-top:1px solid rgba(255,255,255,0.06);
    overflow:hidden;
  }
  /* Ambient glow blobs (pure CSS, no JS) */
  .pm-msg-composer::before, .pm-msg-composer::after{
    content:"";position:absolute;border-radius:50%;filter:blur(96px);pointer-events:none;
    will-change:transform,opacity;
  }
  .pm-msg-composer::before{
    top:-110px;left:22%;width:320px;height:320px;
    background:rgba(139,92,246,0.22);
    animation:pmGlowA 7s ease-in-out infinite;
  }
  .pm-msg-composer::after{
    bottom:-110px;right:18%;width:340px;height:340px;
    background:rgba(99,102,241,0.22);
    animation:pmGlowB 9s ease-in-out infinite;
  }
  @keyframes pmGlowA{0%,100%{opacity:.55;transform:translateY(0)}50%{opacity:.85;transform:translateY(8px)}}
  @keyframes pmGlowB{0%,100%{opacity:.45;transform:translateY(0)}50%{opacity:.75;transform:translateY(-10px)}}

  /* Inner column — centered, max-width like the original demo (max-w-2xl ~ 672px) */
  .pm-msg-composer__inner{
    position:relative;z-index:1;
    max-width:680px;margin:0 auto;
    display:flex;flex-direction:column;gap:14px;
  }

  /* Hero (only visible in empty state) */
  .pm-msg-composer__hero{text-align:center;margin-bottom:6px;}
  .pm-msg-composer__hero h2{
    font:600 26px/1.15 Inter,sans-serif;letter-spacing:-.022em;
    background:linear-gradient(90deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.42) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    margin:0 0 6px;
  }
  .pm-msg-composer__hero-line{
    height:1px;width:100%;
    background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%);
    animation:pmHeroLine .8s .15s ease-out both;
    transform-origin:center;
  }
  @keyframes pmHeroLine{from{transform:scaleX(0);opacity:0}to{transform:scaleX(1);opacity:1}}
  .pm-msg-composer__hero p{
    font:500 12.5px Inter,sans-serif;color:rgba(255,255,255,0.42);
    margin:9px 0 0;letter-spacing:-.005em;
  }

  .pm-msg-composer__card{
    position:relative;
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    background:rgba(255,255,255,0.025);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:18px;
    box-shadow:0 25px 50px -12px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.04) inset;
    transition:border-color .22s ease, box-shadow .22s ease;
  }
  .pm-msg-composer__card:focus-within{
    border-color:rgba(139,92,246,0.45);
    box-shadow:0 0 0 3px rgba(139,92,246,0.14), 0 25px 50px -12px rgba(0,0,0,0.55);
  }
  .pm-msg-composer__textarea-wrap{padding:14px 18px 8px;}
  .pm-msg-composer__textarea{
    width:100%;
    background:transparent;border:none;outline:none;resize:none;
    font:500 14px/1.5 Inter,sans-serif;
    color:rgba(255,255,255,0.92);
    min-height:36px;max-height:200px;
    caret-color:#A78BFA;
  }
  .pm-msg-composer__textarea::placeholder{color:rgba(255,255,255,0.22);}
  .pm-msg-composer__textarea::-webkit-scrollbar{width:6px;}
  .pm-msg-composer__textarea::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:9999px;}

  .pm-msg-composer__bottom{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .pm-msg-composer__icons{display:flex;align-items:center;gap:2px;}
  .pm-msg-composer__icon-btn{
    width:34px;height:34px;border:none;background:transparent;
    color:rgba(255,255,255,0.4);
    border-radius:9px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s ease, color .15s ease, transform .12s ease;
  }
  .pm-msg-composer__icon-btn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.92);}
  .pm-msg-composer__icon-btn:active{transform:scale(0.94);}
  .pm-msg-composer__icon-btn svg{width:16px;height:16px;}
  .pm-msg-composer__icon-btn[disabled]{opacity:.35;cursor:not-allowed;}

  .pm-msg-composer__send{
    display:flex;align-items:center;gap:8px;
    padding:8px 16px;
    border:none;border-radius:10px;
    font:600 13px Inter,sans-serif;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .15s ease, background .15s ease, color .15s ease;
    background:rgba(255,255,255,0.05);
    color:rgba(255,255,255,0.4);
  }
  .pm-msg-composer__send svg{width:14px;height:14px;}
  .pm-msg-composer__send.has-text{
    background:#FFFFFF;color:#0A0A0B;
    box-shadow:0 4px 14px rgba(255,255,255,0.10), 0 1px 0 rgba(255,255,255,0.4) inset;
  }
  .pm-msg-composer__send.has-text:hover{transform:scale(1.02);}
  .pm-msg-composer__send.has-text:active{transform:scale(0.98);}
  .pm-msg-composer__send[disabled]{cursor:not-allowed;}

  /* Sending state — replace icon with spinner */
  .pm-msg-composer__send.is-sending svg{animation:pmSpin 1.2s linear infinite;}
  @keyframes pmSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  /* Suggestion chips below composer */
  .pm-msg-chips{
    display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
    padding-top:4px;
  }
  .pm-msg-chip{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 13px;border-radius:10px;
    background:rgba(255,255,255,0.025);
    border:1px solid rgba(255,255,255,0.05);
    color:rgba(255,255,255,0.6);
    font:500 12.5px Inter,sans-serif;letter-spacing:-.005em;
    cursor:pointer;
    transition:background .15s ease, color .15s ease, border-color .15s ease, transform .12s ease;
    animation:pmChipIn .35s ease-out both;
  }
  .pm-msg-chip:nth-child(1){animation-delay:.05s;}
  .pm-msg-chip:nth-child(2){animation-delay:.12s;}
  .pm-msg-chip:nth-child(3){animation-delay:.19s;}
  .pm-msg-chip:nth-child(4){animation-delay:.26s;}
  .pm-msg-chip:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.92);border-color:rgba(255,255,255,0.10);}
  .pm-msg-chip:active{transform:scale(0.97);}
  .pm-msg-chip svg{width:14px;height:14px;}
  @keyframes pmChipIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* ─── Floating "Sending" pill — 1:1 with the 21st.dev "zap Thinking" pill ─── */
  /* Anchored to the viewport (fixed) so it never overlaps the chips. */
  .pm-msg-thinking{
    position:fixed;left:50%;bottom:16px;
    z-index:60;
    display:flex;align-items:center;gap:12px;
    padding:8px 18px 8px 8px;
    border-radius:9999px;
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 12px 32px -8px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.04) inset;
    opacity:0;pointer-events:none;
    transform:translateX(-50%) translateY(20px);
    transition:opacity .28s ease, transform .28s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .pm-msg-thinking.is-shown{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .pm-msg-thinking__badge{
    width:32px;height:28px;border-radius:9999px;
    background:rgba(255,255,255,0.05);
    display:flex;align-items:center;justify-content:center;
    font:500 12px Inter,sans-serif;letter-spacing:.01em;
    color:rgba(255,255,255,0.92);
    padding-bottom:1px;
    flex:none;
  }

  .pm-msg-thinking__text{
    font:500 14px Inter,sans-serif;letter-spacing:-.005em;
    color:rgba(255,255,255,0.72);
    display:flex;align-items:center;gap:8px;
    padding-right:2px;
  }

  /* Dots — wave left → right, easeInOut, 1.2s, glow halo (matches reference exactly) */
  .pm-msg-thinking__dots{display:flex;align-items:center;}
  .pm-msg-thinking__dots span{
    width:6px;height:6px;border-radius:50%;
    background:rgba(255,255,255,0.92);
    margin:0 2px;
    box-shadow:0 0 4px rgba(255,255,255,0.3);
    animation:pmDot 1.2s ease-in-out infinite;
    opacity:.3;
    transform:scale(.85);
    will-change:opacity,transform;
  }
  .pm-msg-thinking__dots span:nth-child(1){animation-delay:.15s;}
  .pm-msg-thinking__dots span:nth-child(2){animation-delay:.30s;}
  .pm-msg-thinking__dots span:nth-child(3){animation-delay:.45s;}
  @keyframes pmDot{
    0%,100%{opacity:.3;transform:scale(.85);}
    50%{opacity:.9;transform:scale(1.1);}
  }

  /* Recolor the thread list when composer is dark — keep the list light, but add a soft fade */
  .pm-msg-thread__list{position:relative;}

  /* Empty thread state */
  .pm-msg-thread__empty{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    color:var(--ink-mute);text-align:center;padding:40px;
  }
  .pm-msg-thread__empty svg{width:48px;height:48px;color:var(--ink-tert);}
  .pm-msg-thread__empty h3{font-size:17px;font-weight:700;color:var(--ink-2);margin:0;}
  .pm-msg-thread__empty p{font-size:13.5px;margin:0;max-width:340px;}

  /* Loading skeleton */
  .pm-skel{background:linear-gradient(90deg,#EEF2F7 0%,#F8FAFC 50%,#EEF2F7 100%);background-size:200% 100%;animation:skel 1.4s ease-in-out infinite;border-radius:8px;}
  @keyframes skel{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .pm-skel-row{display:flex;gap:12px;padding:12px;}
  .pm-skel-circle{width:42px;height:42px;border-radius:50%;}
  .pm-skel-lines{flex:1;display:flex;flex-direction:column;gap:6px;justify-content:center;}
  .pm-skel-line{height:10px;}
  .pm-skel-line.short{width:50%;}
  .pm-skel-line.med{width:78%;}

  /* Mobile */
  @media (max-width:880px){
    .pm-msg-shell{grid-template-columns:1fr;}
    .pm-msg-inbox{display:flex;}
    .pm-msg-thread{display:none;}
    body.pm-msg-thread-open .pm-msg-inbox{display:none;}
    body.pm-msg-thread-open .pm-msg-thread{display:flex;}
    .pm-msg-thread__back{display:flex;}
  }

  /* ─── Bigger, intentional composer + subtle ambient glow (overrides) ─── */
  .pm-msg-composer{overflow:visible;}
  .pm-msg-composer__inner{max-width:720px;gap:18px;}
  .pm-msg-composer__hero{margin-bottom:8px;}
  .pm-msg-composer__hero h2{font:600 30px/1.15 Inter,sans-serif;letter-spacing:-.022em;}
  .pm-msg-composer__hero p{font:500 13px Inter,sans-serif;margin:11px 0 0;}

  .pm-msg-composer__card{border-radius:20px;}
  /* Soft, barely-noticeable glow living BEHIND the composer card (always on) */
  .pm-msg-composer__card::before{
    content:"";position:absolute;inset:-55px -75px;z-index:-1;
    background:
      radial-gradient(circle at 28% 50%, rgba(139,92,246,0.10) 0%, transparent 55%),
      radial-gradient(circle at 72% 55%, rgba(99,102,241,0.085) 0%, transparent 55%),
      radial-gradient(circle at 50% 100%, rgba(217,70,239,0.05) 0%, transparent 60%);
    filter:blur(48px);
    pointer-events:none;
    opacity:.85;
    animation:pmComposerGlow 7s ease-in-out infinite;
    border-radius:36px;
  }
  .pm-msg-composer__card:focus-within::before{opacity:1;animation-duration:5s;}
  @keyframes pmComposerGlow{
    0%,100%{opacity:.65;transform:scale(1) translateY(0);}
    50%{opacity:.95;transform:scale(1.025) translateY(2px);}
  }

  .pm-msg-composer__textarea-wrap{padding:18px 22px 12px;}
  .pm-msg-composer__textarea{
    font:500 15px/1.55 Inter,sans-serif;
    min-height:60px;max-height:220px;
  }
  .pm-msg-composer__bottom{padding:12px 14px;}
  .pm-msg-composer__icon-btn{width:38px;height:38px;border-radius:10px;}
  .pm-msg-composer__icon-btn svg{width:17px;height:17px;}
  .pm-msg-composer__send{
    padding:10px 20px;
    font:600 13.5px Inter,sans-serif;
    border-radius:11px;
  }
  .pm-msg-composer__send svg{width:15px;height:15px;}

  /* ─── Active thread = SAME dark space, composer pinned near the bottom ─── */
  /* flex-end keeps the messages list at the top of the available
     height and the composer sits low, but we leave ~40px of breathing
     room below so the composer doesn't feel jammed against the
     viewport edge. Top padding is 0 — the list itself adds padding
     equal to the floating Smith Family pill's clearance, so messages
     reach right up under the pill. */
  .pm-msg-thread:not(.is-empty){
    display:flex;flex-direction:column;
    justify-content:flex-end;align-items:center;
    padding:0 28px 40px;gap:14px;
    position:relative;
  }

  /* Compact glass thread head — floats at top of thread pane (replaces the white bar) */
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__head{
    position:absolute;top:18px;left:50%;transform:translateX(-50%);
    z-index:3;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:9999px;
    padding:6px 16px 6px 7px;gap:10px;
    box-shadow:0 8px 24px -10px rgba(0,0,0,0.5);
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__title{color:rgba(255,255,255,0.92);font-size:13px;}
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__sub{color:rgba(255,255,255,0.5);font-size:11px;}
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__avatar{
    width:30px;height:30px;font-size:12px;
    background:linear-gradient(135deg,#6366F1 0%,#A78BFA 100%);
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__icon-btn{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.55);
    width:30px;height:30px;
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__icon-btn:hover{
    background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.92);border-color:rgba(255,255,255,0.14);
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__icon-btn svg{width:14px;height:14px;}

  /* Message list: transparent, centered narrow column, fills the
     available height between the floating thread head and the
     composer. Bigger list = more older messages visible without
     scrolling. Top padding clears the floating Smith Family pill so
     the most recent messages start right under it. */
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__list{
    width:100%;max-width:720px;
    background:transparent;
    flex:1 1 auto;
    min-height:0;
    max-height:none;
    overflow-y:auto;
    padding:70px 4px 6px;
    display:flex;flex-direction:column;justify-content:flex-end;
    gap:2px;
    scroll-behavior:smooth;
    -webkit-mask-image:linear-gradient(180deg, transparent 0%, #000 5px, #000 100%);
            mask-image:linear-gradient(180deg, transparent 0%, #000 5px, #000 100%);
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__list::-webkit-scrollbar{width:6px;}
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__list::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,0.08);border-radius:9999px;
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-thread__list::-webkit-scrollbar-track{background:transparent;}

  /* Composer in active mode: transparent shell, centered, same width
     as the messages list so left/right edges line up cleanly with
     the message bubbles. */
  .pm-msg-thread:not(.is-empty) .pm-msg-composer{
    width:100%;max-width:720px;
    background:transparent;border-top:none;padding:0;
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-composer::before,
  .pm-msg-thread:not(.is-empty) .pm-msg-composer::after{display:none;}

  /* Composer card stays a normal block (full width of the 720px
     centered column). Chips float ABSOLUTELY to its left so they
     don't take width from the card and don't push the card off-center
     — the card aligns with the messages thread above it. */
  .pm-msg-thread:not(.is-empty) .pm-msg-composer__inner{
    flex-direction:column;
    align-items:stretch;
    gap:14px;
    max-width:720px;
    position:relative;
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-chips{
    position:absolute;
    right:calc(100% + 14px);        /* sit just to the left of the card */
    bottom:0;
    width:148px;
    flex-direction:column;
    flex-wrap:nowrap;
    justify-content:flex-end;       /* chips align with the bottom of the card */
    align-items:stretch;
    gap:6px;
    padding-top:0;
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-chip{
    width:100%;
    justify-content:flex-start;
    padding:9px 12px;
    font-size:12px;
    border-radius:9px;
    white-space:nowrap;
  }

  /* "Open Conversations" CTA — only shown when no convo is active */
  .pm-msg-cta{display:flex;justify-content:center;margin-top:2px;}
  .pm-msg-cta-btn{
    display:inline-flex;align-items:center;gap:9px;
    padding:11px 18px 11px 16px;
    border:1px solid rgba(139,92,246,0.28);
    border-radius:12px;
    background:linear-gradient(180deg, rgba(139,92,246,0.16), rgba(99,102,241,0.10));
    color:#C4B5FD;
    font:600 13px Inter,sans-serif;letter-spacing:-.005em;
    cursor:pointer;
    box-shadow:0 4px 14px -6px rgba(139,92,246,0.35), 0 1px 0 rgba(255,255,255,0.06) inset;
    transition:transform .12s ease, background .15s ease, color .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .pm-msg-cta-btn:hover{
    background:linear-gradient(180deg, rgba(139,92,246,0.24), rgba(99,102,241,0.14));
    color:#FFFFFF;
    border-color:rgba(167,139,250,0.45);
    box-shadow:0 10px 28px -8px rgba(139,92,246,0.55), 0 1px 0 rgba(255,255,255,0.10) inset;
    transform:translateY(-1px);
  }
  .pm-msg-cta-btn:active{transform:scale(0.98);}
  .pm-msg-cta-btn svg{width:14px;height:14px;}
  .pm-msg-cta-btn .pm-msg-cta-arrow{transition:transform .15s ease;}
  .pm-msg-cta-btn:hover .pm-msg-cta-arrow{transform:translateX(2px);}

  /* Disabled empty-state composer styling */
  .pm-msg-composer__textarea:disabled{
    cursor:not-allowed;opacity:.7;
  }
  .pm-msg-composer__textarea:disabled::placeholder{color:rgba(255,255,255,0.30);}
  .pm-msg-chip:disabled,
  .pm-msg-chip[disabled]{
    opacity:.45;cursor:not-allowed;pointer-events:none;
  }

  /* ─── Dark, Claude-clean bubbles for active thread ─── */
  .pm-msg-thread:not(.is-empty) .pm-msg-bubble{
    background:rgba(255,255,255,0.045);
    color:rgba(255,255,255,0.92);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 8px 24px -16px rgba(0,0,0,0.55);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    max-width:75%;
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-bubble-row.is-self .pm-msg-bubble{
    background:#FFFFFF;color:#0A0A0B;border-color:transparent;
    box-shadow:0 8px 22px -10px rgba(255,255,255,0.10), 0 1px 0 rgba(255,255,255,0.4) inset;
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-bubble-avatar{
    background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.92);
    border:1px solid rgba(255,255,255,0.06);
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-sender{color:rgba(255,255,255,0.55);}
  .pm-msg-thread:not(.is-empty) .pm-msg-time{color:rgba(255,255,255,0.4);}
  .pm-msg-thread:not(.is-empty) .pm-msg-bubble-row.is-self .pm-msg-time{color:rgba(0,0,0,0.5);}
  .pm-msg-thread:not(.is-empty) .pm-msg-subject{color:#A78BFA;border-bottom-color:rgba(167,139,250,0.25);}
  .pm-msg-thread:not(.is-empty) .pm-msg-bubble-row.is-self .pm-msg-subject{
    color:rgba(0,0,0,0.7);border-bottom-color:rgba(0,0,0,0.15);
  }

  /* Day separator on dark */
  .pm-msg-thread:not(.is-empty) .pm-msg-day{color:rgba(255,255,255,0.4);}
  .pm-msg-thread:not(.is-empty) .pm-msg-day:before,
  .pm-msg-thread:not(.is-empty) .pm-msg-day:after{background:rgba(255,255,255,0.08);}

  /* System card on dark */
  .pm-msg-thread:not(.is-empty) .pm-msg-system{
    background:linear-gradient(180deg, rgba(99,102,241,0.10), rgba(139,92,246,0.04));
    border:1px solid rgba(139,92,246,0.20);
    box-shadow:0 8px 24px -12px rgba(0,0,0,0.5);
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-system__head{
    background:rgba(255,255,255,0.04);
    border-bottom:1px solid rgba(139,92,246,0.18);
    color:#C4B5FD;
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-system__title{color:rgba(255,255,255,0.95);}
  .pm-msg-thread:not(.is-empty) .pm-msg-system__body{color:rgba(255,255,255,0.78);}
  .pm-msg-thread:not(.is-empty) .pm-msg-system__foot{
    border-top:1px dashed rgba(139,92,246,0.24);
    color:#A78BFA;
  }

  /* Reactions on dark */
  .pm-msg-thread:not(.is-empty) .pm-msg-reaction{
    background:rgba(20,20,30,0.85);
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    color:rgba(255,255,255,0.95);
  }

  /* Empty fallback (convo open but no messages yet) on dark */
  .pm-msg-thread:not(.is-empty) .pm-msg-empty{color:rgba(255,255,255,0.5);}

  /* Bubble drop-in animation (the "in-space" feel) */
  @keyframes pmBubbleIn{
    from{opacity:0;transform:translateY(10px) scale(.985);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-bubble-row{
    animation:pmBubbleIn .38s cubic-bezier(0.4, 0, 0.2, 1) both;
  }
  .pm-msg-thread:not(.is-empty) .pm-msg-system{
    animation:pmBubbleIn .42s cubic-bezier(0.4, 0, 0.2, 1) both;
  }

  /* ─── Final polish: crisper border, brighter icons, bolder chips ─── */
  .pm-msg-composer__inner{max-width:740px;gap:20px;}
  .pm-msg-composer__card{
    border:1px solid rgba(255,255,255,0.11);
    background:rgba(255,255,255,0.03);
    border-radius:22px;
  }
  .pm-msg-composer__card:focus-within{
    border-color:rgba(167,139,250,0.55);
    box-shadow:0 0 0 3px rgba(139,92,246,0.16), 0 25px 50px -12px rgba(0,0,0,0.55);
  }

  /* Bigger, more intentional textarea */
  .pm-msg-composer__textarea-wrap{padding:20px 24px 14px;}
  .pm-msg-composer__textarea{
    font:500 16px/1.55 Inter,sans-serif;
    min-height:68px;max-height:240px;
    color:rgba(255,255,255,0.95);
  }
  .pm-msg-composer__textarea::placeholder{color:rgba(255,255,255,0.32);}

  /* Divider between textarea and bottom row — clearer, intentional */
  .pm-msg-composer__bottom{
    padding:13px 16px;
    border-top:1px solid rgba(255,255,255,0.12);
  }

  /* Icon buttons in composer: crisper, slightly larger, more confident */
  .pm-msg-composer__icon-btn{
    color:rgba(255,255,255,0.6);
    width:40px;height:40px;border-radius:11px;
  }
  .pm-msg-composer__icon-btn:hover{
    background:rgba(255,255,255,0.08);
    color:rgba(255,255,255,1);
  }
  .pm-msg-composer__icon-btn[disabled]{opacity:.75;}
  .pm-msg-composer__icon-btn svg{width:19px;height:19px;}

  /* Send button — slightly larger, more intentional */
  .pm-msg-composer__send{
    padding:11px 22px;
    font:600 14px Inter,sans-serif;
    border-radius:12px;
  }
  .pm-msg-composer__send svg{width:16px;height:16px;}

  /* Quick-action chips: bigger, bolder, intentional */
  .pm-msg-chip{
    padding:11px 17px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.11);
    color:rgba(255,255,255,0.82);
    font:600 13.5px Inter,sans-serif;letter-spacing:-.005em;
    border-radius:12px;
    gap:9px;
  }
  .pm-msg-chip:hover{
    background:rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.98);
    border-color:rgba(255,255,255,0.18);
  }
  .pm-msg-chip svg{width:16px;height:16px;}

  /* ─── Subtle ambient glow + cursor-follow glow (matches 21st.dev reference) ─── */
  .pm-msg-thread{
    background:radial-gradient(ellipse 80% 70% at 50% 65%, #111114 0%, #08080A 55%, #060608 100%);
  }
  /* ── Aurora glow #1: huge diagonal ribbon on the RIGHT half, behind the composer ── */
  .pm-msg-thread::before{
    display:block !important;
    content:"";position:absolute;
    top:50%;left:72%;
    width:1100px;height:130vh;max-height:1500px;
    border-radius:50%;
    background:radial-gradient(ellipse at center,
      rgba(167,139,250,0.55) 0%,
      rgba(139,92,246,0.30) 32%,
      rgba(99,102,241,0.14) 62%,
      transparent 90%);
    animation:pmAurora 5.5s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
    opacity:0.10;
    will-change:transform, opacity, filter;
  }
  /* ── Aurora glow #2: same size, over and above the "How can I help today?" title ── */
  .pm-msg-thread::after{
    display:block !important;
    content:"";position:absolute;
    top:14%;left:50%;
    width:1100px;height:130vh;max-height:1500px;
    border-radius:50%;
    background:radial-gradient(ellipse at center,
      rgba(167,139,250,0.55) 0%,
      rgba(139,92,246,0.30) 32%,
      rgba(99,102,241,0.14) 62%,
      transparent 90%);
    animation:pmAurora 5.5s ease-in-out infinite;
    animation-delay:-2.7s;
    pointer-events:none;
    z-index:0;
    opacity:0.10;
    will-change:transform, opacity, filter;
  }

  /* Diagonal sway: top swings NW, bottom swings SE — like northern lights ribbons */
  @keyframes pmAurora{
    0%,100%{
      opacity:0.10;
      transform:translate(-50%, -50%) rotate(-32deg) scale(0.95) translate(-6px, -3px);
      filter:blur(80px) hue-rotate(-8deg);
    }
    25%{
      opacity:0.16;
      transform:translate(-50%, -50%) rotate(-28deg) scale(1.0) translate(2px, -6px);
      filter:blur(82px) hue-rotate(4deg);
    }
    50%{
      opacity:0.20;
      transform:translate(-50%, -50%) rotate(-22deg) scale(1.05) translate(8px, 2px);
      filter:blur(84px) hue-rotate(18deg);
    }
    75%{
      opacity:0.16;
      transform:translate(-50%, -50%) rotate(-26deg) scale(1.02) translate(2px, 6px);
      filter:blur(82px) hue-rotate(8deg);
    }
  }

  /* Composer card becomes a dark, opaque island so the glow stays behind it */
  .pm-msg-composer__card{
    background:rgba(14,14,20,0.78) !important;
    backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  }

  /* Composer card never has its own static glow */
  .pm-msg-composer__card::before{display:none !important;}
  .pm-msg-composer{overflow:visible;}
  .pm-msg-composer::before,
  .pm-msg-composer::after{display:none !important;}

  /* Cursor fog — sits BEHIND UI elements so it never tints the composer / chips / CTA / title */
  .pm-msg-cursor-glow{
    position:fixed;
    top:-200px;left:-200px;
    width:400px;height:400px;
    border-radius:50%;
    pointer-events:none;
    z-index:0;
    opacity:0.045;
    background:radial-gradient(circle,
      rgba(167,139,250,0.55) 0%,
      rgba(139,92,246,0.30) 35%,
      rgba(99,102,241,0.15) 60%,
      transparent 82%);
    filter:blur(54px);
    transform:translate3d(50vw, 50vh, 0);
    transition:transform .75s cubic-bezier(0.22, 1, 0.36, 1), opacity .55s ease;
    will-change:transform;
  }
  .pm-msg-cursor-glow.is-active{opacity:0.08;}

  /* Lift composer__inner so it sits above the cursor glow, then make chips opaque enough to hide it under them */
  .pm-msg-composer__inner{z-index:5;}
  .pm-msg-thread__head{z-index:6 !important;}
  .pm-msg-chip{
    background:rgba(15,15,22,0.65);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  }
  .pm-msg-chip:hover{
    background:rgba(25,25,32,0.75);
  }

  /* ─── CALL MODAL (full-screen overlay) ────────────────────────────── */
  .pm-call-modal{
    position:fixed;inset:0;z-index:9000;
    background:radial-gradient(120% 100% at 50% 0%, #1a1830 0%, #0c0c14 60%, #07070b 100%);
    display:none;flex-direction:column;
    color:#fff;
    font-family:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;
  }
  .pm-call-modal.is-open{display:flex;}
  .pm-call-modal__top{
    padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;
    background:linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 100%);
  }
  .pm-call-modal__who{display:flex;align-items:center;gap:12px;min-width:0;}
  .pm-call-modal__avatar{
    width:42px;height:42px;border-radius:50%;
    background:linear-gradient(135deg,#5750F1,#9F75FF);
    display:flex;align-items:center;justify-content:center;
    font:800 16px Inter,sans-serif;color:#fff;flex:0 0 auto;
    box-shadow:0 4px 16px -4px rgba(87,80,241,0.55);
  }
  .pm-call-modal__name{font:700 16px Inter,sans-serif;letter-spacing:-.01em;color:#fff;margin:0;}
  .pm-call-modal__status{font:500 12.5px Inter,sans-serif;color:rgba(255,255,255,0.62);margin-top:2px;}
  .pm-call-modal__type{
    font:600 11.5px Inter,sans-serif;letter-spacing:.06em;text-transform:uppercase;
    padding:5px 11px;border-radius:9999px;
    background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.78);
    border:1px solid rgba(255,255,255,0.10);
  }
  .pm-call-modal__stage{
    flex:1;min-height:0;display:flex;align-items:center;justify-content:center;
    padding:14px 22px;position:relative;
  }
  .pm-call-tiles{
    display:grid;grid-template-columns:1fr;gap:14px;
    width:100%;max-width:1100px;height:100%;
  }
  .pm-call-tiles.is-two{grid-template-columns:1fr 1fr;}
  .pm-call-tile{
    position:relative;border-radius:18px;overflow:hidden;
    background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.015));
    border:1px solid rgba(255,255,255,0.06);
    aspect-ratio:16/10;
    box-shadow:0 24px 60px -28px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .pm-call-tile video{
    position:absolute;inset:0;
    width:100%;height:100%;object-fit:cover;background:transparent;display:block;
    z-index:2;
    opacity:0;
    transition:opacity .18s ease;
    pointer-events:none;
  }
  .pm-call-tile video.is-playing{opacity:1;}
  .pm-call-tile__placeholder{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:rgba(255,255,255,0.62);
    z-index:1;
  }
  .pm-call-tile__avatar-lg{
    width:104px;height:104px;border-radius:50%;
    background:linear-gradient(135deg,#5750F1,#9F75FF);
    display:flex;align-items:center;justify-content:center;
    font:800 38px Inter,sans-serif;color:#fff;
    box-shadow:0 16px 48px -16px rgba(87,80,241,0.5);
  }
  .pm-call-tile__placeholder-name{font:600 15px Inter,sans-serif;color:rgba(255,255,255,0.85);}
  .pm-call-tile__placeholder-sub{font:500 12.5px Inter,sans-serif;color:rgba(255,255,255,0.45);}
  .pm-call-tile__label{
    position:absolute;left:12px;bottom:12px;
    background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    color:#fff;font:600 12px Inter,sans-serif;
    padding:5px 10px;border-radius:8px;
    border:1px solid rgba(255,255,255,0.08);
  }
  .pm-call-tile__mute{
    position:absolute;right:12px;bottom:12px;
    width:30px;height:30px;border-radius:50%;
    background:rgba(220,38,38,0.92);color:#fff;
    display:none;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,0.18);
  }
  .pm-call-tile__mute svg{width:14px;height:14px;}
  .pm-call-tile.is-muted .pm-call-tile__mute{display:flex;}
  .pm-call-modal__controls{
    padding:18px 22px 28px;
    display:flex;align-items:center;justify-content:center;gap:16px;
    background:linear-gradient(0deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 100%);
  }
  .pm-call-ctrl{
    width:56px;height:56px;border-radius:50%;
    background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.12);
    color:#fff;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .12s ease, background .15s ease, border-color .15s ease;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  }
  .pm-call-ctrl:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);}
  .pm-call-ctrl:active{transform:translateY(0);}
  .pm-call-ctrl svg{width:22px;height:22px;}
  .pm-call-ctrl.is-off{background:rgba(220,38,38,0.85);border-color:rgba(220,38,38,0.9);}
  .pm-call-ctrl.is-off:hover{background:rgba(220,38,38,1);}
  .pm-call-ctrl.is-end{background:#dc2626;border-color:rgba(255,255,255,0.18);}
  .pm-call-ctrl.is-end:hover{background:#b91c1c;}

  /* ─── INCOMING RING MODAL ─────────────────────────────────────────── */
  .pm-ring-modal{
    position:fixed;inset:auto 0 24px 0;z-index:9100;
    display:none;justify-content:center;
    pointer-events:none;
  }
  .pm-ring-modal.is-open{display:flex;}
  .pm-ring-modal__card{
    pointer-events:auto;
    background:rgba(15,15,22,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:18px;padding:14px 16px;
    display:flex;align-items:center;gap:14px;
    box-shadow:0 24px 60px -20px rgba(0,0,0,0.7);
    color:#fff;min-width:380px;max-width:520px;
    animation:pmRingSlideIn .35s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes pmRingSlideIn{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .pm-ring-modal__avatar{
    width:42px;height:42px;border-radius:50%;
    background:linear-gradient(135deg,#5750F1,#9F75FF);
    display:flex;align-items:center;justify-content:center;
    font:800 16px Inter,sans-serif;color:#fff;flex:0 0 auto;
    animation:pmRingPulse 1.6s ease-in-out infinite;
  }
  @keyframes pmRingPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(87,80,241,0.45);}
    50%{box-shadow:0 0 0 10px rgba(87,80,241,0);}
  }
  .pm-ring-modal__text{flex:1;min-width:0;}
  .pm-ring-modal__title{font:700 14px Inter,sans-serif;color:#fff;margin:0;}
  .pm-ring-modal__sub{font:500 12.5px Inter,sans-serif;color:rgba(255,255,255,0.62);margin-top:2px;}
  .pm-ring-modal__actions{display:flex;gap:8px;flex:0 0 auto;}
  .pm-ring-btn{
    width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:#fff;
    transition:transform .12s ease, background .15s ease;
  }
  .pm-ring-btn:hover{transform:translateY(-1px);}
  .pm-ring-btn svg{width:18px;height:18px;}
  .pm-ring-btn.is-accept{background:#22c55e;}
  .pm-ring-btn.is-accept:hover{background:#16a34a;}
  .pm-ring-btn.is-decline{background:#dc2626;}
  .pm-ring-btn.is-decline:hover{background:#b91c1c;}

  /* ─── RECENTS MODAL ───────────────────────────────────────────────── */
  .pm-recents-modal{
    position:fixed;inset:0;z-index:8500;display:none;
    align-items:flex-start;justify-content:center;
    background:rgba(7,7,11,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    padding:80px 20px 20px;
  }
  .pm-recents-modal.is-open{display:flex;}
  .pm-recents-modal__card{
    width:100%;max-width:520px;
    background:#fff;border:1px solid var(--border);border-radius:16px;
    box-shadow:0 24px 64px -20px rgba(15,23,42,0.35);
    overflow:hidden;
    display:flex;flex-direction:column;max-height:80vh;
  }
  .pm-recents-modal__head{
    padding:16px 18px;border-bottom:1px solid var(--border-soft);
    display:flex;align-items:center;justify-content:space-between;
  }
  .pm-recents-modal__title{font:700 16px Inter,sans-serif;color:var(--ink-2);margin:0;letter-spacing:-.01em;}
  .pm-recents-modal__close{
    width:30px;height:30px;border-radius:8px;background:transparent;border:none;cursor:pointer;
    color:var(--ink-mute);display:flex;align-items:center;justify-content:center;
  }
  .pm-recents-modal__close:hover{background:#F1F5F9;color:var(--ink-2);}
  .pm-recents-modal__close svg{width:16px;height:16px;}
  .pm-recents-modal__body{flex:1;overflow:auto;padding:6px 0;}
  .pm-recents-row{
    display:flex;align-items:center;gap:12px;
    padding:11px 18px;
    border-bottom:1px solid var(--border-soft);
  }
  .pm-recents-row:last-child{border-bottom:none;}
  .pm-recents-row__icon{
    width:34px;height:34px;border-radius:50%;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    color:#fff;background:#5750F1;
  }
  .pm-recents-row__icon.is-missed{background:#dc2626;}
  .pm-recents-row__icon.is-out{background:#0F172A;}
  .pm-recents-row__icon svg{width:16px;height:16px;}
  .pm-recents-row__body{flex:1;min-width:0;}
  .pm-recents-row__top{display:flex;align-items:center;gap:8px;}
  .pm-recents-row__name{font:600 13.5px Inter,sans-serif;color:var(--ink-2);letter-spacing:-.005em;}
  .pm-recents-row__type{
    font:600 10.5px Inter,sans-serif;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 7px;border-radius:9999px;
    background:#F1F5F9;color:var(--ink-mute);
  }
  .pm-recents-row__sub{font:500 12px Inter,sans-serif;color:var(--ink-mute);margin-top:2px;}
  .pm-recents-row__time{font:500 12px Inter,sans-serif;color:var(--ink-tert);flex:0 0 auto;}
  .pm-recents-empty{padding:38px 20px;text-align:center;color:var(--ink-mute);font:500 13px Inter,sans-serif;}

  /* ─── NOTIFY (Web Push) toggle in topbar — glass on dark ──────────── */
  .pm-msg-notify-toggle{
    display:flex;align-items:center;gap:8px;
    padding:7px 13px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:9999px;
    font:600 13px Inter,sans-serif;color:rgba(255,255,255,0.78);
    cursor:pointer;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    transition:background .15s ease, color .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .pm-msg-notify-toggle:hover{background:rgba(255,255,255,0.12);color:#fff;}
  .pm-msg-notify-toggle.is-on{
    background:var(--primary);color:#fff;border-color:var(--primary);
    box-shadow:0 4px 14px -6px rgba(87,80,241,0.55);
  }
  .pm-msg-notify-toggle.is-on:hover{background:#4842D6;color:#fff;}
  .pm-msg-notify-toggle svg{width:15px;height:15px;}

  /* ════════════════════════════════════════════════════════════════
     LIGHT MODE — applied only when <body class="theme-light">.
     The composer's theme button toggles this, persisted to localStorage.
     Default (no class) = dark.
     ════════════════════════════════════════════════════════════════ */

  /* Base pane: soft pearl/lavender mist */
  body.theme-light .pm-msg-thread,
  body.theme-light .pm-msg-thread.is-empty,
  body.theme-light .pm-msg-thread:not(.is-empty){
    background:radial-gradient(ellipse 90% 75% at 50% 60%,
      #FDFCFF 0%,
      #F5F3FC 55%,
      #ECE9F7 100%);
  }
  /* Aurora blobs — soften and warm against the light bg */
  body.theme-light .pm-msg-thread::before{
    background:rgba(167,139,250,0.32);
    opacity:0.45;
  }
  body.theme-light .pm-msg-thread::after{
    background:rgba(99,102,241,0.28);
    opacity:0.42;
  }

  /* Topbar pills (Conversations, Notify, User pod) — light glass */
  body.theme-light .pm-msg-inbox-toggle{
    background:rgba(255,255,255,0.70);
    border-color:rgba(15,23,42,0.08);
    color:#475569;
    box-shadow:0 1px 2px rgba(15,23,42,0.04);
  }
  body.theme-light .pm-msg-inbox-toggle:hover{
    background:#fff;color:#0F172A;
  }
  body.theme-light .pm-msg-inbox-toggle .pm-msg-inbox-toggle__count{
    background:rgba(15,23,42,0.06);color:#1F2937;
  }
  body.theme-light .pm-msg-notify-toggle{
    background:rgba(255,255,255,0.70);
    border-color:rgba(15,23,42,0.08);
    color:#475569;
  }
  body.theme-light .pm-msg-notify-toggle:hover{background:#fff;color:#0F172A;}
  body.theme-light .nx-userpod{
    background:rgba(255,255,255,0.78);
    border-color:rgba(15,23,42,0.08);
    box-shadow:0 1px 2px rgba(15,23,42,0.04);
  }
  body.theme-light .nx-userpod__name{color:#1F2937;}

  /* Smith Family thread head pill — light glass */
  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-thread__head{
    background:rgba(255,255,255,0.78);
    border-color:rgba(15,23,42,0.08);
    box-shadow:0 4px 14px -6px rgba(15,23,42,0.10);
  }
  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-thread__title{color:#0F172A;}
  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-thread__sub{color:#64748B;}
  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-thread__icon-btn{
    background:rgba(255,255,255,0.6);
    border-color:rgba(15,23,42,0.08);
    color:#64748B;
  }
  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-thread__icon-btn:hover{
    background:#fff;color:#1F2937;border-color:rgba(87,80,241,0.30);
  }

  /* Hero (empty state) — dark gradient text instead of white-on-dark */
  body.theme-light .pm-msg-composer__hero h2{
    background:linear-gradient(90deg,#0F172A 0%,#5750F1 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  body.theme-light .pm-msg-composer__hero p{color:#64748B;}
  body.theme-light .pm-msg-composer__hero-line{
    background:linear-gradient(90deg, transparent 0%, rgba(15,23,42,0.16) 50%, transparent 100%);
  }

  /* Composer card — bright glass with soft shadow.
     !important to beat the earlier dark-mode rule that sets the same. */
  body.theme-light .pm-msg-composer__card{
    background:rgba(255,255,255,0.85) !important;
    border:1px solid rgba(15,23,42,0.06) !important;
    box-shadow:
      0 30px 60px -20px rgba(15,23,42,0.10),
      0 1px 0 rgba(255,255,255,0.85) inset !important;
  }
  body.theme-light .pm-msg-composer__card:focus-within{
    border-color:rgba(87,80,241,0.30) !important;
    box-shadow:
      0 30px 60px -20px rgba(87,80,241,0.18),
      0 1px 0 rgba(255,255,255,0.85) inset !important;
  }
  body.theme-light .pm-msg-composer__textarea{
    color:#0F172A;
    caret-color:#5750F1;
  }
  body.theme-light .pm-msg-composer__textarea::placeholder{color:#94A3B8;}
  body.theme-light .pm-msg-composer__textarea:disabled{color:#94A3B8;}
  body.theme-light .pm-msg-composer__bottom{border-top-color:rgba(15,23,42,0.06);}
  body.theme-light .pm-msg-composer__icon-btn{color:#94A3B8;}
  body.theme-light .pm-msg-composer__icon-btn:hover:not(:disabled){color:#475569;background:rgba(15,23,42,0.04);}
  body.theme-light .pm-msg-composer__send{background:rgba(15,23,42,0.06);color:#94A3B8;}
  body.theme-light .pm-msg-composer__send.has-text{
    background:#0F172A;color:#fff;
    box-shadow:0 8px 22px -8px rgba(15,23,42,0.40);
  }

  /* Quick-action chips — light glass */
  body.theme-light .pm-msg-chip{
    background:rgba(255,255,255,0.78) !important;
    border:1px solid rgba(15,23,42,0.06) !important;
    color:#475569 !important;
  }
  body.theme-light .pm-msg-chip:hover{
    background:#fff !important;
    color:#0F172A !important;
    border-color:rgba(87,80,241,0.28) !important;
  }

  /* Open Conversations CTA */
  body.theme-light .pm-msg-cta-btn{
    background:linear-gradient(180deg, rgba(87,80,241,0.10), rgba(99,102,241,0.06));
    border-color:rgba(87,80,241,0.25);
    color:#5750F1;
    box-shadow:0 4px 14px -6px rgba(87,80,241,0.20), 0 1px 0 rgba(255,255,255,0.85) inset;
  }
  body.theme-light .pm-msg-cta-btn:hover{
    background:linear-gradient(180deg, rgba(87,80,241,0.16), rgba(99,102,241,0.10));
    color:#4338CA;
    border-color:rgba(87,80,241,0.40);
    box-shadow:0 10px 28px -8px rgba(87,80,241,0.30);
  }

  /* Day dividers */
  body.theme-light .pm-msg-day{color:#94A3B8;}

  /* Incoming message bubbles */

    color:#0F172A !important;
    border:1px solid rgba(15,23,42,0.06) !important;

  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-bubble-row.is-self .pm-msg-bubble{
    background:#5750F1 !important;
    color:#fff !important;
    border-color:transparent !important;
    box-shadow:0 8px 22px -10px rgba(87,80,241,0.45) !important;

  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-sender{color:#5750F1 !important;}
  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-time{color:#94A3B8 !important;}
  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-bubble-row.is-self .pm-msg-time{

  }
  body.theme-light .pm-msg-thread:not(.is-empty) .pm-msg-bubble-row.is-self .pm-msg-subject{

  /* Send-status floating "PM Sending" pill */
  body.theme-light .pm-msg-thinking{

  /* Theme toggle button in the composer — switches between dark and light.

  .pm-msg-theme-btn .pm-theme-icon-moon{display:none;}

  /* ── Call modal in light theme ────────────────────────────────
     Default modal is dark; when the client is on pearl light, the
     call screen should match. Backgrounds/glass/text all flip. */
  body.theme-light .pm-call-modal{
    background:radial-gradient(120% 100% at 50% 0%,

      #F2EEFB 55%,

  body.theme-light .pm-call-modal__status{color:#64748B;}

  body.theme-light .pm-call-ctrl{

  }
  body.theme-light .pm-call-ctrl:hover{background:#fff;color:#0F172A;}
  /* Destructive states stay branded red — they're status indicators, not theme. */
  body.theme-light .pm-call-ctrl.is-off{
    background:rgba(220,38,38,0.92) !important;
    border-color:rgba(220,38,38,0.95) !important;

  }
  body.theme-light .pm-call-ctrl.is-off:hover{background:#dc2626 !important;color:#fff !important;}
  body.theme-light .pm-call-ctrl.is-end{

    color:#fff !important;
  }
  body.theme-light .pm-call-ctrl.is-end:hover{background:#b91c1c !important;color:#fff !important;}

  /* Incoming-call ring modal — light glass card */
  body.theme-light .pm-ring-modal__card{

    border:1px solid rgba(15,23,42,0.08);

  }
  body.theme-light .pm-ring-modal__title{color:#0F172A;}
  body.theme-light .pm-ring-modal__sub{color:#64748B;}

  /* ── End LIGHT MODE ──────────────────────────────────────────── */
</style>
</head>
<body class="pm-has-sidebar">
<div id="pmSidebar"></div>

<main class="pm-main">
  <div class="nx-topbar">
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="pm-msg-inbox-toggle" id="inboxToggle" type="button" aria-label="Toggle conversations" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Conversations</span>
        <span class="pm-msg-inbox-toggle__count" id="inboxToggleCount">0</span>
      </button>
      <h1 class="nx-topbar__title">Messages</h1>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="pm-msg-notify-toggle" id="notifyToggle" type="button" style="display:none;" aria-label="Enable notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span id="notifyToggleLabel">Enable notifications</span>

        <div class="nx-userpod__avatar" id="upAvatar">·</div>
        <div class="nx-userpod__name" id="upName">…</div>
      </div>
    </div>
  </div>

  <div class="pm-msg-shell">
    <!-- INBOX -->
    <aside class="pm-msg-inbox" aria-label="Conversations">
      <div class="pm-msg-inbox__head">

          <input type="text" id="inboxSearch" placeholder="Search conversations" />
        </div>
      </div>
      <div class="pm-msg-inbox__list" id="inboxList">
        <!-- skeleton during load -->
        <div class="pm-skel-row"><div class="pm-skel pm-skel-circle"></div><div class="pm-skel-lines"><div class="pm-skel pm-skel-line med"></div><div class="pm-skel pm-skel-line short"></div></div></div>
        <div class="pm-skel-row"><div class="pm-skel pm-skel-circle"></div><div class="pm-skel-lines"><div class="pm-skel pm-skel-line med"></div><div class="pm-skel pm-skel-line short"></div></div></div>
        <div class="pm-skel-row"><div class="pm-skel pm-skel-circle"></div><div class="pm-skel-lines"><div class="pm-skel pm-skel-line med"></div><div class="pm-skel pm-skel-line short"></div></div></div>
      </div>
    </aside>

    <!-- THREAD -->
    <section class="pm-msg-thread is-empty" id="threadPane">

      <!-- Active thread -->
      <div class="pm-msg-thread__head" id="threadHead" style="display:none;">
        <button class="pm-msg-thread__back" id="threadBack" aria-label="Back to inbox">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="pm-msg-thread__avatar" id="threadAvatar">·</div>
        <div>
          <h2 class="pm-msg-thread__title" id="threadTitle">…</h2>
          <p class="pm-msg-thread__sub" id="threadSub">…</p>
        </div>
        <div class="pm-msg-thread__actions">
          <button class="pm-msg-thread__icon-btn" id="btnAudioCall" title="Voice call (coming soon)" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </button>
          <button class="pm-msg-thread__icon-btn" id="btnVideoCall" title="Video call (coming soon)" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
        </div>
      </div>

      <div class="pm-msg-thread__list" id="threadList" style="display:none;"></div>

      <div class="pm-msg-composer" id="composer" style="display:none;">
        <div class="pm-msg-composer__inner">
          <div class="pm-msg-composer__hero" id="composerHero" style="display:none;">

          <div class="pm-msg-composer__card">

                <button class="pm-msg-composer__icon-btn" id="btnAttach" type="button" aria-label="Attach file" title="Attach (coming soon)" disabled>

                </button>
                <button class="pm-msg-composer__icon-btn pm-msg-theme-btn" id="btnTheme" type="button" aria-label="Toggle theme" title="Switch theme">
                  <svg class="pm-theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                  <svg class="pm-theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
              </div>
              <button class="pm-msg-composer__send" id="composerSend" type="button" disabled aria-label="Send">

                <span>Send</span>
              </button>
            </div>
          </div>

          <div class="pm-msg-cta" id="composerCta" style="display:none;">
            <button class="pm-msg-cta-btn" id="ctaOpenConvos" type="button" aria-label="Open Conversations">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Open Conversations</span>
              <svg class="pm-msg-cta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>

          </div>
        </div>

        <!-- Floating "Thinking…" pill, only shown while sending -->
        <div class="pm-msg-thinking" id="composerThinking" aria-hidden="true">

<script>
// Demo-mode pre-stub: must run BEFORE sidebar.js (which redirects on no auth)
if (new URLSearchParams(location.search).get('demo') === '1') {
