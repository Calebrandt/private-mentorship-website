<script src="js/sidebar.js?v=20260512a"></script>
<script>
(async () => {
  const $ = id => document.getElementById(id);
  const sb = window.pmSupabase;
  // M is resolved AFTER the demo stub block below (which may swap window.pmMessages).
  let M;

  function esc(s){return (s||'').toString().replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
  function initial(s){return ((s||'?').trim().charAt(0) || '?').toUpperCase();}
  function fmtTime(iso){
    const d = new Date(iso); const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) return d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
    const sameYear = d.getFullYear() === now.getFullYear();
    return d.toLocaleDateString([], sameYear ? {month:'short', day:'numeric'} : {month:'short', day:'numeric', year:'numeric'});
  }
  function fmtDay(iso){
    const d = new Date(iso); const now = new Date();
    const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
    if (d.toDateString() === now.toDateString()) return 'Today';
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });
  }
  function fmtBubbleTime(iso){
    return new Date(iso).toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
  }
  function pillClass(scope, type){
    const t = (type||'').toUpperCase();
    if (t === 'CLIENT_SHARED') return 'pm-msg-row__pill pm-msg-row__pill--family';
    if (t === 'OWNER_DIRECT' || t === 'ASSISTANT_PRIVATE') return 'pm-msg-row__pill pm-msg-row__pill--direct';
    return 'pm-msg-row__pill pm-msg-row__pill--direct';
  }
  function pillLabel(scope, type){
    const t = (type||'').toUpperCase();
    if (t === 'CLIENT_SHARED') return 'Family';
    if (t === 'ASSISTANT_PRIVATE') return 'Assistant';
    if (t === 'OWNER_DIRECT') return 'Direct · Owner';
    return (scope || 'Direct').toString().replace(/_/g,' ').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
  }

  // ─── Auth (with ?demo=1 stub for design previews) ──────────────
  const isDemo = new URLSearchParams(location.search).get('demo') === '1';
  let me = null;

  if (isDemo) {
    me = { id: 'demo-me', email: 'demo@privatementorship.ca' };
    $('upName').textContent = 'Jane Demo';
    $('upAvatar').textContent = 'J';
    // Stub the service so the UI renders without DB
    const now = Date.now();
    const otherId = 'demo-other';
    const ownerId = 'demo-owner';
    const adminId = 'demo-admin';
    const demoConvos = [
      { id:'c1', title:'Smith Family', scope:'FAMILY', type:'CLIENT_SHARED', client_id:'cli-1',
        last_message_body:'Membership change approved · plan starts June 1', last_message_subject:'Membership Change Approved', last_message_type:'system',
        last_message_at: new Date(now - 1000*60*8).toISOString() },
      { id:'c2', title:'Sarah · Assistant', scope:'DIRECT', type:'ASSISTANT_PRIVATE',
        last_message_body:'Sounds good — see you Thursday at 4pm.', last_message_subject:'', last_message_type:null,
        last_message_at: new Date(now - 1000*60*60*2).toISOString() },
      { id:'c3', title:'Owner Direct', scope:'DIRECT', type:'OWNER_DIRECT',
        last_message_body:'Just sent over the new contract for review.', last_message_subject:'', last_message_type:null,
        last_message_at: new Date(now - 1000*60*60*26).toISOString() },
    ];
    const demoMsgs = {
      c1: [
        { id:'m1', conversation_id:'c1', profile_id:adminId, body:'Welcome! Looking forward to working together.', sender_name:'Caleb · Owner', created_at: new Date(now - 1000*60*60*48).toISOString() },
        { id:'m2', conversation_id:'c1', profile_id:'demo-me', body:'Thank you, excited to get started.', sender_name:'Jane', created_at: new Date(now - 1000*60*60*47).toISOString() },
        { id:'m3', conversation_id:'c1', profile_id:adminId, body:'Sarah will be your assistant — she\'ll reach out today.', sender_name:'Caleb · Owner', created_at: new Date(now - 1000*60*60*47 + 30000).toISOString() },
        { id:'m4', conversation_id:'c1', profile_id:adminId, message_type:'system',
          subject:'Membership Change Approved', event_type:'membership_change_approved',
          body:'Your new plan (1mo_24h) has been approved.\n\nIt starts on June 1, 2026 and includes 24 hours over 1 month(s).\n\n3 weekly session(s) scheduled.',
          created_at: new Date(now - 1000*60*8).toISOString() },
      ],
      c2: [
        { id:'m5', conversation_id:'c2', profile_id:otherId, body:'Hi Jane! Wanted to confirm Thursday 4pm.', sender_name:'Sarah', created_at: new Date(now - 1000*60*60*3).toISOString() },
        { id:'m6', conversation_id:'c2', profile_id:'demo-me', body:'Sounds good — see you Thursday at 4pm.', sender_name:'Jane', created_at: new Date(now - 1000*60*60*2).toISOString(), reaction:'👍' },
      ],
      c3: [
        { id:'m7', conversation_id:'c3', profile_id:ownerId, body:'Just sent over the new contract for review.', sender_name:'Caleb · Owner', created_at: new Date(now - 1000*60*60*26).toISOString() },
      ],
    };
    window.pmMessages = {
      loadConversations: async () => demoConvos,
      loadMessages: async (id) => demoMsgs[id] || [],
      sendMessage: async ({ conversationId, body }) => {
        const m = { id:'m'+Math.random().toString(36).slice(2,7), conversation_id:conversationId, profile_id:'demo-me', body, sender_name:'Jane', created_at:new Date().toISOString() };
        (demoMsgs[conversationId] = demoMsgs[conversationId] || []).push(m);
        return m;
      },
      setReaction: async () => {},
      subscribeToConversation: () => null,
      unsubscribe: () => {},
      startPresenceHeartbeat: () => {},
      stopPresenceHeartbeat: () => {},
      clearPresence: async () => {},
      loadCallLogs: async () => [],
    };

    // Stub the calls service in demo mode so buttons just show the modal
    // without trying to connect to Stream.io.
    const demoRecents = [
      { id:'cl1', conversation_id:'c1', call_id:'demo-1', call_type:'video',
        status:'ended', created_at: new Date(now - 1000*60*60*4).toISOString(),
        caller_user_id:'demo-other', recipient_user_id:'demo-me' },
      { id:'cl2', conversation_id:'c1', call_id:'demo-2', call_type:'audio',
        status:'missed', created_at: new Date(now - 1000*60*60*22).toISOString(),
        caller_user_id:'demo-other', recipient_user_id:'demo-me' },
      { id:'cl3', conversation_id:'c1', call_id:'demo-3', call_type:'audio',
        status:'ended', created_at: new Date(now - 1000*60*60*48).toISOString(),
        caller_user_id:'demo-me', recipient_user_id:'demo-other' },
    ];
    let demoCbs = {};
    let demoIsInCall = false;
    let demoMicEnabled = true;
    let demoCamEnabled = false;
    window.pmCalls = {
      startCall: async ({ callType }) => {
        demoIsInCall = true;
        demoCamEnabled = callType === 'video';
        const callId = `demo-call-${Date.now()}`;
        // Simulate connecting → answered after 1.6s
        setTimeout(() => { demoCbs.onParticipants?.([
          { userId: 'demo-me', isLocalParticipant: true, audioStream: null, videoStream: null },
          { userId: 'demo-other', isLocalParticipant: false, audioStream: null, videoStream: null },
        ]); }, 1600);
        demoCbs.onLocalState?.({ micEnabled: demoMicEnabled, cameraEnabled: demoCamEnabled, callType });
        return { callId };
      },
      acceptIncoming: async ({ callId, callType }) => {
        demoIsInCall = true;
        demoCamEnabled = callType === 'video';
        demoCbs.onParticipants?.([
          { userId: 'demo-me', isLocalParticipant: true },
          { userId: 'demo-other', isLocalParticipant: false },
        ]);
        demoCbs.onLocalState?.({ micEnabled: demoMicEnabled, cameraEnabled: demoCamEnabled, callType });
        return { callId };
      },
      declineIncoming: async () => {},
      endActiveCall: async () => { demoIsInCall = false; demoCbs.onEnded?.(); },
      toggleMic: async () => { demoMicEnabled = !demoMicEnabled; demoCbs.onLocalState?.({ micEnabled: demoMicEnabled, cameraEnabled: demoCamEnabled }); },
      toggleCamera: async () => { demoCamEnabled = !demoCamEnabled; demoCbs.onLocalState?.({ micEnabled: demoMicEnabled, cameraEnabled: demoCamEnabled }); },
      bindVideo: () => () => {},
      bindAudio: () => () => {},
      subscribeToIncoming: () => {},
      unsubscribeFromIncoming: () => {},
      loadRecentsForConversation: async () => demoRecents,
      disconnect: async () => {},
      on: (ev, fn) => { demoCbs[ev] = fn; },
      isInCall: () => demoIsInCall,
      activeCallId: () => null,
      activeCallType: () => null,
    };
  }

  M = window.pmMessages;

  if (!isDemo) {
    try {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { location.href = 'signin.html?next=' + encodeURIComponent('messages.html'); return; }
      me = user;
      const { data: prof } = await sb.from('profiles').select('full_name').eq('user_id', user.id).maybeSingle();
      const name = prof?.full_name || user.email || 'Me';
      $('upName').textContent = name;
      $('upAvatar').textContent = initial(name);
    } catch (e) {
      console.error(e); location.href = 'signin.html'; return;
    }
  }

  // ─── Inbox ─────────────────────────────────────────────────────
  let convos = [];
  let activeConvoId = null;
  let activeConvo = null;
  let liveChannel = null;

  function renderInbox(filter = ''){
    const list = $('inboxList');
    const q = filter.trim().toLowerCase();
    const filtered = !q ? convos : convos.filter(c =>
      (c.title || '').toLowerCase().includes(q)
      || (c.last_message_body || '').toLowerCase().includes(q)
    );
    if (!filtered.length) {
      list.innerHTML = '<div class="pm-msg-empty">No conversations yet.</div>';
      return;
    }
    list.innerHTML = filtered.map(c => {
      const isActive = c.id === activeConvoId ? ' is-active' : '';
      const preview = c.last_message_type === 'system'
        ? `📋 ${esc(c.last_message_subject || 'System update')}`
        : esc(c.last_message_body || 'No messages yet');
      return `<div class="pm-msg-row${isActive}" data-id="${esc(c.id)}">
        <div class="pm-msg-row__avatar">${esc(initial(c.title))}</div>
        <div class="pm-msg-row__body">
          <div class="pm-msg-row__top">
            <span class="pm-msg-row__title">${esc(c.title || 'Untitled')}</span>
            <span class="pm-msg-row__time">${esc(fmtTime(c.last_message_at))}</span>
          </div>
          <div class="pm-msg-row__meta">
            <span class="${pillClass(c.scope, c.type)}">${esc(pillLabel(c.scope, c.type))}</span>
          </div>
          <p class="pm-msg-row__preview">${preview}</p>
        </div>
      </div>`;
    }).join('');
    list.querySelectorAll('.pm-msg-row').forEach(row => {
      row.addEventListener('click', () => openConversation(row.dataset.id));
    });
  }

  $('inboxSearch').addEventListener('input', (e) => renderInbox(e.target.value));

  // ─── Inbox toggle (collapsible drawer) ─────────────────────────
  const shellEl = document.querySelector('.pm-msg-shell');
  const toggleBtn = $('inboxToggle');
  const toggleCount = $('inboxToggleCount');
  function setInboxOpen(open){
    shellEl.classList.toggle('is-inbox-collapsed', !open);
    toggleBtn.classList.toggle('is-active', open);
    toggleBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
  }
  toggleBtn.addEventListener('click', () => {
    const isOpen = !shellEl.classList.contains('is-inbox-collapsed');
    setInboxOpen(!isOpen);
  });
  // Default: collapsed (focus on the composer)
  setInboxOpen(false);

  try {
    convos = await M.loadConversations(me.id);
    renderInbox();
    if (toggleCount) toggleCount.textContent = String(convos.length);
  } catch (e) {
    console.error('loadConversations failed', e);
    $('inboxList').innerHTML = '<div class="pm-msg-empty">Couldn\'t load conversations.</div>';
  }

  // Show the empty-mode composer (hero + composer + chips) when no thread is open
  // (showComposerEmpty is defined later in this IIFE)

  // ─── Thread ────────────────────────────────────────────────────
  function renderMessages(messages){
    const list = $('threadList');
    if (!messages.length) {
      list.innerHTML = '<div class="pm-msg-empty" style="padding:60px 20px;">No messages yet — say hi 👋</div>';
      return;
    }
    let html = '';
    let lastDay = '';
    let lastSender = null;
    messages.forEach(m => {
      const day = fmtDay(m.created_at);
      if (day !== lastDay) {
        html += `<div class="pm-msg-day">${esc(day)}</div>`;
        lastDay = day; lastSender = null;
      }

      // System message
      if (m.message_type === 'system') {
        html += `<div class="pm-msg-system">
          <div class="pm-msg-system__head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
            Official System Update
          </div>
          <div class="pm-msg-system__title">${esc(m.subject || 'System Update')}</div>
          <div class="pm-msg-system__body">${esc(m.body)}</div>
          <div class="pm-msg-system__foot">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Secure Contract Log · Private Mentorship
          </div>
        </div>`;
        lastSender = null;
        return;
      }

      const isSelf = m.profile_id === me.id;
      const stack = lastSender === m.profile_id;
      const rowCls = `pm-msg-bubble-row${isSelf ? ' is-self' : ''}${stack ? ' is-stack' : ''}`;
      const avatar = isSelf ? '' : `<div class="pm-msg-bubble-avatar">${esc(initial(m.sender_name))}</div>`;
      const senderName = (!isSelf && !stack) ? `<div class="pm-msg-sender">${esc(m.sender_name || 'Member')}</div>` : '';
      const subject = m.subject ? `<div class="pm-msg-subject">${esc(m.subject)}</div>` : '';
      const reaction = m.reaction ? `<span class="pm-msg-reaction" title="Reaction">${esc(m.reaction)}</span>` : '';

      html += `<div class="${rowCls}" data-mid="${esc(m.id)}">
        <div class="pm-msg-bubble-avatar">${esc(initial(m.sender_name))}</div>
        <div class="pm-msg-bubble">
          ${senderName}${subject}<div>${esc(m.body)}</div>
          <div class="pm-msg-time">${esc(fmtBubbleTime(m.created_at))}</div>
          ${reaction}
        </div>
      </div>`;
      lastSender = m.profile_id;
    });
    list.innerHTML = html;
    list.scrollTop = list.scrollHeight;
  }

  async function openConversation(id){
    if (!id || id === activeConvoId) return;
    activeConvoId = id;
    activeConvo = convos.find(c => c.id === id);
    if (!activeConvo) return;

    // Auto-close the conversations drawer once a thread is picked —
    // the user's focus shifts to the messages.
    setInboxOpen(false);

    document.body.classList.add('pm-msg-thread-open');
    $('threadPane').classList.remove('is-empty');

    $('threadHead').style.display = 'flex';
    $('threadList').style.display = 'block';
    showComposerInThread();

    $('threadAvatar').textContent = initial(activeConvo.title);
    $('threadTitle').textContent = activeConvo.title || 'Conversation';
    $('threadSub').textContent = pillLabel(activeConvo.scope, activeConvo.type);

    // Re-render inbox so the active row highlights
    renderInbox($('inboxSearch').value || '');

    $('threadList').innerHTML = '<div class="pm-msg-empty">Loading…</div>';
    try {
      const msgs = await M.loadMessages(id);
      renderMessages(msgs);
    } catch (e) {
      console.error('loadMessages failed', e);
      $('threadList').innerHTML = '<div class="pm-msg-empty">Couldn\'t load messages.</div>';
    }

    // Realtime
    if (liveChannel) M.unsubscribe(liveChannel);
    liveChannel = M.subscribeToConversation({
      conversationId: id,
      onInsert: async (newRow) => {
        // Naive refresh — pull last 50 to get sender_name enriched
        const msgs = await M.loadMessages(id);
        renderMessages(msgs);
      },
      onUpdate: async () => {
        const msgs = await M.loadMessages(id);
        renderMessages(msgs);
      },
    });

    // Presence heartbeat
    M.startPresenceHeartbeat({ userId: me.id, conversationId: id });
  }

  $('threadBack').addEventListener('click', () => {
    document.body.classList.remove('pm-msg-thread-open');
  });

  // ─── Composer ──────────────────────────────────────────────────
  const ta = $('composerInput');
  const sendBtn = $('composerSend');
  const heroEl = $('composerHero');
  const thinkingEl = $('composerThinking');

  // Chip templates — clicking one inserts the template text and focuses the textarea
  document.querySelectorAll('#composerChips .pm-msg-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const template = chip.dataset.template || '';
      ta.value = (ta.value ? ta.value.trimEnd() + ' ' : '') + template;
      autosize();
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
    });
  });

  // ─── Theme toggle (dark ↔ pearl light) ─────────────────────────
  // Persisted in localStorage so each client's choice sticks across
  // page reloads and is remembered next session.
  (function setupTheme(){
    const THEME_KEY = 'pm-msg-theme';
    const apply = (t) => {
      if (t === 'light') document.body.classList.add('theme-light');
      else document.body.classList.remove('theme-light');
    };
    let saved = 'dark';
    try { saved = localStorage.getItem(THEME_KEY) || 'dark'; } catch (_) {}
    apply(saved);
    const btn = document.getElementById('btnTheme');
    if (btn) btn.addEventListener('click', () => {
      const next = document.body.classList.contains('theme-light') ? 'dark' : 'light';
      try { localStorage.setItem(THEME_KEY, next); } catch (_) {}
      apply(next);
    });
  })();

  const ctaEl = $('composerCta');
  const chipEls = document.querySelectorAll('#composerChips .pm-msg-chip');
  const heroSubEl = heroEl ? heroEl.querySelector('p') : null;

  function showComposerEmpty(){
    $('composer').style.display = 'block';
    heroEl.style.display = 'block';
    if (heroSubEl) heroSubEl.textContent = 'Pick a conversation to start chatting';
    ta.disabled = true;
    ta.placeholder = 'Select a conversation to start chatting…';
    if (ctaEl) ctaEl.style.display = 'flex';
    chipEls.forEach(c => c.disabled = true);
    autosize();
  }
  function showComposerInThread(){
    $('composer').style.display = 'block';
    heroEl.style.display = 'none';
    if (heroSubEl) heroSubEl.textContent = 'Type a message or pick a quick action below';
    ta.disabled = false;
    ta.placeholder = 'Write a message…';
    if (ctaEl) ctaEl.style.display = 'none';
    chipEls.forEach(c => c.disabled = false);
    autosize();
  }

  // CTA: open the conversations drawer
  const ctaBtn = $('ctaOpenConvos');
  if (ctaBtn) ctaBtn.addEventListener('click', () => setInboxOpen(true));

  function autosize(){
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    const hasText = !!ta.value.trim();
    sendBtn.disabled = !hasText || !activeConvoId;
    sendBtn.classList.toggle('has-text', hasText && !!activeConvoId);
  }
  ta.addEventListener('input', autosize);
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });

  async function doSend(){
    const body = ta.value.trim();
    if (!body || !activeConvoId) return;
    sendBtn.disabled = true;
    sendBtn.classList.add('is-sending');
    thinkingEl.classList.add('is-shown');
    const minShownUntil = Date.now() + 3000; // hold the pill ~3s like the 21st.dev reference
    try {
      await M.sendMessage({ conversationId: activeConvoId, userId: me.id, body });
      ta.value = '';
      autosize();
      // Realtime listener will re-render — but as a fallback, refresh now
      const msgs = await M.loadMessages(activeConvoId);
      renderMessages(msgs);
      // Bump inbox row preview locally
      const c = convos.find(x => x.id === activeConvoId);
      if (c) { c.last_message_body = body; c.last_message_at = new Date().toISOString(); convos.sort((a,b)=>new Date(b.last_message_at)-new Date(a.last_message_at)); renderInbox($('inboxSearch').value || ''); }
      // Fan out a Web Push to other participants whose tab is closed/backgrounded
      if (!isDemo && window.pmPush) {
        const senderName = $('upName').textContent || 'Someone';
        window.pmPush.fanOutForMessage({
          conversationId: activeConvoId,
          senderUserId: me.id,
          subject: senderName,
          body,
        });
      }
    } catch (e) {
      console.error('send failed', e);
      alert('Could not send message: ' + (e.message || e));
    } finally {
      const remaining = Math.max(0, minShownUntil - Date.now());
      setTimeout(() => thinkingEl.classList.remove('is-shown'), remaining);
      sendBtn.classList.remove('is-sending');
      const hasText = !!ta.value.trim();
      sendBtn.disabled = !hasText || !activeConvoId;
      sendBtn.classList.toggle('has-text', hasText && !!activeConvoId);
      ta.focus();
    }
  }
  sendBtn.addEventListener('click', doSend);

  // Cleanup on unload
  window.addEventListener('beforeunload', () => {
    if (liveChannel) M.unsubscribe(liveChannel);
    M.stopPresenceHeartbeat();
    if (me) M.clearPresence(me.id);
  });

  // Initial state: show the dark hero+composer+chips on the right pane
  showComposerEmpty();

  // ─── Calls (audio + video via Stream.io) ────────────────────────────
  const C = window.pmCalls;
  const callModal = $('callModal');
  const ringModal = $('ringModal');
  const recentsModal = $('recentsModal');
  const callTilesEl = $('callTiles');
  const audioSinks = $('callAudioSinks');
  let _callRecipients = [];        // userIds we're calling (to bind incoming participant tile)
  let _localStateCache = { micEnabled:true, cameraEnabled:false, callType:'audio' };
  let _videoBindCleanup = [];
  let _incomingPayload = null;

  function openCallModal({ name, callType }) {
    $('callAvatar').textContent = initial(name || 'Call');
    $('callName').textContent = name || 'Call';
    $('callStatus').textContent = 'Ringing…';
    $('callType').textContent = callType === 'video' ? 'Video Call' : 'Audio Call';
    callTilesEl.classList.remove('is-two');
    callTilesEl.innerHTML = `<div class="pm-call-tile" data-uid="self">
      <div class="pm-call-tile__placeholder">
        <div class="pm-call-tile__avatar-lg">${esc(initial($('upName').textContent))}</div>
        <div class="pm-call-tile__placeholder-name">You</div>
        <div class="pm-call-tile__placeholder-sub">${callType === 'video' ? 'Camera off' : 'Connecting…'}</div>
      </div>
      <div class="pm-call-tile__label">You</div>
      <div class="pm-call-tile__mute" title="Mic off"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
    </div>`;
    callModal.classList.add('is-open');
    // Reset control button states
    $('callBtnMic').classList.remove('is-off');
    $('callBtnCam').classList.toggle('is-off', callType !== 'video');
    $('callBtnCam').style.display = callType === 'video' ? 'flex' : 'none';
  }
  function closeCallModal() {
    callModal.classList.remove('is-open');
    callTilesEl.innerHTML = '';
    audioSinks.innerHTML = '';
    _videoBindCleanup.forEach(fn => { try { fn(); } catch (_) {} });
    _videoBindCleanup = [];
  }

  let _lastTilesSig = '';
  function renderCallTiles(participants){
    if (!participants?.length) return;

    // Update connection status without rebuilding the DOM
    const hasRemote = participants.some(p => !p.isLocalParticipant);
    $('callStatus').textContent = hasRemote ? 'Connected' : 'Ringing…';

    // Skip a full rebuild when the participant set hasn't actually
    // changed. Stream emits a participants$ tick on every state delta
    // (audio levels, mute toggles, etc.) — rebuilding the DOM each
    // time froze the page.
    const sig = participants
      .map(p => p.sessionId || p.userId || (p.isLocalParticipant ? 'self' : 'other'))
      .sort()
      .join('|');
    if (sig === _lastTilesSig) return;
    _lastTilesSig = sig;

    const otherName = activeConvo?.title || (_incomingPayload?.callerName || 'Caller');
    callTilesEl.classList.toggle('is-two', participants.length > 1);
    // Cleanup old bindings
    _videoBindCleanup.forEach(fn => { try { fn(); } catch (_) {} });
    _videoBindCleanup = [];
    audioSinks.innerHTML = '';

    callTilesEl.innerHTML = participants.map((p, i) => {
      const isSelf = p.isLocalParticipant;
      const name = isSelf ? 'You' : otherName;
      const initials = initial(name);
      // Stream's TrackType: 1 = audio, 2 = video. Use publishedTracks
      // so when the remote turns camera off mid-call, we know to swap
      // their tile to the avatar placeholder instead of a frozen frame.
      const hasVideoPublished = (p.publishedTracks || []).includes(2);
      const subText = isSelf
        ? (_localStateCache.cameraEnabled ? 'Camera on' : 'Camera off')
        : (hasVideoPublished ? 'Connected' : 'Camera off');
      return `<div class="pm-call-tile" data-uid="${esc(p.userId || (isSelf ? 'self' : 'other'))}" data-self="${isSelf ? '1' : '0'}" data-has-video="${hasVideoPublished ? '1' : '0'}">
        <video autoplay playsinline muted="${isSelf ? 'muted' : ''}"></video>
        <div class="pm-call-tile__placeholder" data-fallback>
          <div class="pm-call-tile__avatar-lg">${esc(initials)}</div>
          <div class="pm-call-tile__placeholder-name">${esc(name)}</div>
          <div class="pm-call-tile__placeholder-sub">${esc(subText)}</div>
        </div>
        <div class="pm-call-tile__label">${esc(name)}</div>
        <div class="pm-call-tile__mute"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
      </div>`;
    }).join('');

    // Always bind every participant — Stream's bindVideoElement is what
    // actually triggers the SFU to send their tracks. Without binding,
    // remote video never arrives. The placeholder is shown until the
    // <video> element starts playing actual frames.
    callTilesEl.querySelectorAll('.pm-call-tile').forEach((tile, i) => {
      const p = participants[i]; if (!p) return;
      const videoEl = tile.querySelector('video');
      const fb = tile.querySelector('[data-fallback]');

      if (videoEl) {
        const hasVideoPublishedNow = (p.publishedTracks || []).includes(2);
        // The video element MUST stay in the layout (display:block) for
        // Stream's dynascale to consider it "visible" and subscribe to
        // the track. We toggle opacity instead of display.
        if (p.isLocalParticipant) {
          // Start with the placeholder visible — the 'playing' event
          // below will flip on .is-playing the moment the local camera
          // stream attaches and produces frames. This avoids depending
          // on _localStateCache, which can be stale on first render.
          videoEl.classList.remove('is-playing');
          if (fb) fb.style.display = 'flex';
          videoEl.addEventListener('playing', () => {
            videoEl.classList.add('is-playing');
            if (fb) fb.style.display = 'none';
          });
          const hideLocal = () => {
            videoEl.classList.remove('is-playing');
            if (fb) fb.style.display = 'flex';
          };
          videoEl.addEventListener('emptied', hideLocal);
          videoEl.addEventListener('pause', hideLocal);
          videoEl.addEventListener('ended', hideLocal);
        } else {
          // Remote: hide video until actual frames arrive ('playing'
          // event). If publishedTracks doesn't include video, also
          // clear the srcObject so a cached last-frame doesn't show.
          videoEl.classList.remove('is-playing');
          if (fb) fb.style.display = 'flex';
          if (!hasVideoPublishedNow) {
            try { videoEl.srcObject = null; } catch (_) {}
          }
          videoEl.addEventListener('playing', () => {
            videoEl.classList.add('is-playing');
            if (fb) fb.style.display = 'none';
          });
          const hide = () => {
            videoEl.classList.remove('is-playing');
            if (fb) fb.style.display = 'flex';
          };
          videoEl.addEventListener('emptied', hide);
          videoEl.addEventListener('pause', hide);
          videoEl.addEventListener('ended', hide);
        }
        // ALWAYS bind — this is what tells Stream's SFU to start
        // delivering this participant's video. If we skip binding when
        // publishedTracks is briefly empty (race during call setup),
        // we'd never get the stream even after their camera comes
        // online. Stream handles the no-video-yet case internally.
        _videoBindCleanup.push(C.bindVideo(videoEl, p));
      }

      // Bind audio for every remote participant unconditionally
      if (!p.isLocalParticipant) {
        const audioEl = document.createElement('audio');
        audioSinks.appendChild(audioEl);
        _videoBindCleanup.push(C.bindAudio(audioEl, p));
      }
    });
  }

  C.on('onParticipants', renderCallTiles);
  C.on('onLocalState', (s) => {
    _localStateCache = { ..._localStateCache, ...s };
    $('callBtnMic').classList.toggle('is-off', !s.micEnabled);
    $('callBtnCam').classList.toggle('is-off', !s.cameraEnabled);
    // Reflect mute/camera-off state on self tile
    const selfTile = callTilesEl.querySelector('.pm-call-tile[data-self="1"]') || callTilesEl.querySelector('.pm-call-tile[data-uid="self"]');
    if (selfTile) selfTile.classList.toggle('is-muted', !s.micEnabled);
  });
  C.on('onEnded', () => closeCallModal());

  // Buttons in thread head
  const btnAudio = $('btnAudioCall');
  const btnVideo = $('btnVideoCall');
  const btnRecents = $('btnRecents');
  // Enable now that calls service is loaded
  if (btnAudio) btnAudio.disabled = false;
  if (btnVideo) btnVideo.disabled = false;
  if (btnRecents) btnRecents.disabled = false;
  if (btnAudio) btnAudio.title = 'Voice call';
  if (btnVideo) btnVideo.title = 'Video call';
  if (btnRecents) btnRecents.title = 'Call history';

  async function resolveRecipientUserIds() {
    if (!activeConvoId || isDemo) return ['demo-other'];
    try {
      const { data: parts } = await sb.from('conversation_participants')
        .select('profile_id').eq('conversation_id', activeConvoId).neq('profile_id', me.id);
      return (parts || []).map(p => p.profile_id);
    } catch (e) { console.warn('[calls] participants lookup failed', e); return []; }
  }

  async function handleStartCall(callType) {
    if (!activeConvoId) { alert('Open a conversation first.'); return; }
    if (C.isInCall?.()) { alert('Already on a call.'); return; }
    try {
      _callRecipients = await resolveRecipientUserIds();
      openCallModal({ name: activeConvo?.title || 'Call', callType });
      await C.startCall({
        conversationId: activeConvoId,
        callType,
        callerUserId: me.id,
        recipientUserIds: _callRecipients,
      });
    } catch (e) {
      console.error('[calls] startCall failed', e);
      alert('Could not start call: ' + (e.message || e));
      closeCallModal();
    }
  }
  if (btnAudio) btnAudio.addEventListener('click', () => handleStartCall('audio'));
  if (btnVideo) btnVideo.addEventListener('click', () => handleStartCall('video'));

  // Call control buttons
  $('callBtnMic').addEventListener('click', () => C.toggleMic());
  $('callBtnCam').addEventListener('click', () => C.toggleCamera());
  $('callBtnEnd').addEventListener('click', async () => { await C.endActiveCall(); closeCallModal(); });

  // Recents modal
  function fmtCallStatus(row) {
    const t = row.call_type === 'video' ? 'Video' : 'Audio';
    if (row.status === 'missed') return `${t} · Missed`;
    if (row.status === 'declined') return `${t} · Declined`;
    if (row.status === 'ringing') return `${t} · Ringing…`;
    if (row.status === 'answered') return `${t} · In progress`;
    return `${t} · Ended`;
  }
  async function openRecents() {
    if (!activeConvoId) { alert('Open a conversation first.'); return; }
    recentsModal.classList.add('is-open');
    const body = $('recentsBody');
    body.innerHTML = '<div class="pm-recents-empty">Loading…</div>';
    try {
      const rows = await C.loadRecentsForConversation(activeConvoId);
      if (!rows.length) { body.innerHTML = '<div class="pm-recents-empty">No call history yet.</div>'; return; }
      body.innerHTML = rows.map(r => {
        const isOut = r.caller_user_id === me.id;
        const isMissed = r.status === 'missed' || (r.status === 'declined' && !isOut);
        const cls = isMissed ? ' is-missed' : (isOut ? ' is-out' : '');
        const icon = r.call_type === 'video'
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
        return `<div class="pm-recents-row">
          <div class="pm-recents-row__icon${cls}">${icon}</div>
          <div class="pm-recents-row__body">
            <div class="pm-recents-row__top">
              <span class="pm-recents-row__name">${esc(activeConvo?.title || 'Conversation')}</span>
              <span class="pm-recents-row__type">${isOut ? 'Outgoing' : 'Incoming'}</span>
            </div>
            <div class="pm-recents-row__sub">${esc(fmtCallStatus(r))}</div>
          </div>
          <div class="pm-recents-row__time">${esc(fmtTime(r.created_at))}</div>
        </div>`;
      }).join('');
    } catch (e) {
      console.error('[calls] loadRecents failed', e);
      body.innerHTML = '<div class="pm-recents-empty">Couldn\'t load call history.</div>';
    }
  }
  if (btnRecents) btnRecents.addEventListener('click', openRecents);
  $('recentsClose').addEventListener('click', () => recentsModal.classList.remove('is-open'));
  recentsModal.addEventListener('click', (e) => { if (e.target === recentsModal) recentsModal.classList.remove('is-open'); });

  // Incoming call ring (non-demo)
  if (!isDemo) {
    C.on('onIncoming', (row) => {
      _incomingPayload = row;
      $('ringAvatar').textContent = initial('Caller');
      $('ringTitle').textContent = `Incoming ${row.call_type === 'video' ? 'video' : 'voice'} call`;
      $('ringSub').textContent = 'Tap accept to join';
      ringModal.classList.add('is-open');
    });
    C.subscribeToIncoming(me.id);
  }

  $('ringAccept').addEventListener('click', async () => {
    if (!_incomingPayload) return;
    ringModal.classList.remove('is-open');
    try {
      openCallModal({ name: activeConvo?.title || 'Caller', callType: _incomingPayload.call_type });
      await C.acceptIncoming({ callId: _incomingPayload.call_id, callType: _incomingPayload.call_type, userId: me.id });
    } catch (e) {
      console.error('[calls] accept failed', e);
      alert('Could not join call: ' + (e.message || e));
      closeCallModal();
    }
  });
  $('ringDecline').addEventListener('click', async () => {
    if (!_incomingPayload) return;
    ringModal.classList.remove('is-open');
    try { await C.declineIncoming({ callId: _incomingPayload.call_id, userId: me.id }); } catch (_) {}
    _incomingPayload = null;
  });

  // Cleanup calls on unload
  window.addEventListener('beforeunload', () => {
    try { C.unsubscribeFromIncoming?.(); } catch (_) {}
    try { C.endActiveCall?.(); } catch (_) {}
    try { C.disconnect?.(); } catch (_) {}
  });

  // ─── Web Push registration (browser notifications when tab is closed) ─
  const notifyBtn = $('notifyToggle');
  const notifyLabel = $('notifyToggleLabel');
  function setNotifyState(state) {
    if (!notifyBtn) return;
    if (state === 'unsupported' || state === 'denied' || state === 'no-vapid-key') {
      notifyBtn.style.display = 'none'; return;
    }
    notifyBtn.style.display = 'flex';
    if (state === 'granted') {
      notifyBtn.classList.add('is-on');
      notifyLabel.textContent = 'Notifications on';
      notifyBtn.title = 'Notifications enabled — click to turn off';
    } else {
      notifyBtn.classList.remove('is-on');
      notifyLabel.textContent = 'Enable notifications';
      notifyBtn.title = 'Get a notification when someone messages you';
    }
  }

  if (!isDemo && window.pmPush) {
    if (!window.pmPush.canUse()) {
      setNotifyState('unsupported');
    } else if (!window.PM_VAPID_PUBLIC_KEY) {
      // Owner hasn't generated VAPID keys yet — keep the button hidden
      setNotifyState('no-vapid-key');
    } else {
      // Best-effort init: registers SW + re-subscribes if previously granted.
      (async () => {
        const initRes = await window.pmPush.init({ userId: me.id });
        const perm = initRes.ok ? 'granted' : (initRes.reason || 'default');
        setNotifyState(perm);
      })();

      notifyBtn.addEventListener('click', async () => {
        const cur = await window.pmPush.getCurrentPermission();
        if (cur === 'granted') {
          // Toggle off — local unsubscribe (browser-level revoke must be done in browser settings)
          await window.pmPush.unsubscribe({ userId: me.id });
          setNotifyState('default');
        } else {
          try {
            const res = await window.pmPush.requestPermissionAndSubscribe({ userId: me.id });
            setNotifyState(res.perm || 'default');
          } catch (e) {
            console.error('[push] subscribe failed', e);
            alert('Could not enable notifications: ' + (e.message || e));
          }
        }
      });

      // Listen for clicks on push notifications — the SW posts the conversationId
      window.pmPush.onServiceWorkerMessage((data) => {
        if (data?.type === 'PM_OPEN_CONVERSATION' && data.conversationId) {
          openConversation(data.conversationId);
        }
      });
    }
  }

  // ?c=<id> from a notification click → open that conversation on load
  const _params = new URLSearchParams(location.search);
  const wantedConvoId = _params.get('c') || _params.get('conversationId');
  if (wantedConvoId) {
    // Wait a tick so convos are loaded
    setTimeout(() => { openConversation(wantedConvoId); }, 200);
  }

  // ?incomingCall=<callId>&callType=<audio|video> arrives from the
  // site-wide ring overlay (incoming-call-ring.js on dashboard etc.).
  // Auto-accept the call so the user lands directly in the call modal.
  const incomingCallId = _params.get('incomingCall');
  const incomingCallType = _params.get('callType') || 'audio';
  if (!isDemo && incomingCallId && me?.id && C) {
    setTimeout(async () => {
      try {
        const callerName = activeConvo?.title || 'Caller';
        openCallModal({ name: callerName, callType: incomingCallType });
        await C.acceptIncoming({
          callId: incomingCallId,
          callType: incomingCallType,
          userId: me.id,
        });
      } catch (e) {
        console.error('[ring] auto-accept failed', e);
        try { closeCallModal(); } catch (_) {}
      }
    }, 350);
  }

  // Cursor-follow glow — barely visible, follows mouse like the 21st.dev reference
  const glow = document.getElementById('cursorGlow');
  if (glow) {
    let pendingFrame = null;
    let lx = window.innerWidth / 2, ly = window.innerHeight / 2;
    const onMove = (e) => {
      lx = e.clientX; ly = e.clientY;
      glow.classList.add('is-active');
      if (!pendingFrame) {
        pendingFrame = requestAnimationFrame(() => {
          glow.style.transform = `translate3d(${lx}px, ${ly}px, 0)`;
          pendingFrame = null;
        });
      }
    };
    document.addEventListener('mousemove', onMove, { passive: true });
  }
})();
</script>
